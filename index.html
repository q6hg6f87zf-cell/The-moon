<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RobCo OS - Peak CRT Build</title>
    <style>
        body { margin: 0; overflow: hidden; background-color: #020402; font-family: monospace; user-select: none; -webkit-user-select: none; }
        canvas { display: block; }
        
        #ui { position: absolute; top: 20px; left: 20px; color: #4af626; pointer-events: none; z-index: 10; font-size: 11px; letter-spacing: 2px; text-shadow: 0 0 5px #4af626; }
        
        #crt-overlay {
            position: absolute; top: 0; left: 0; width: 100vw; height: 100vh;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.25) 50%), linear-gradient(90deg, rgba(255, 0, 0, 0.03), rgba(0, 255, 0, 0.01), rgba(0, 0, 255, 0.03));
            background-size: 100% 3px, 3px 100%;
            pointer-events: none; z-index: 5; mix-blend-mode: overlay;
        }
    </style>

    <script type="importmap">
        {
            "imports": {
                "three": "https://esm.sh/three@0.160.0",
                "three/addons/": "https://esm.sh/three@0.160.0/examples/jsm/"
            }
        }
    </script>
</head>
<body>
    <div id="crt-overlay"></div>
    <div id="ui">ROBCO OS // GPU TYPING ENGINE ACTIVE</div>
    
    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

        // --- 1. Scene Setup ---
        const scene = new THREE.Scene();
        
        const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(0, 0, 50);

        const renderer = new THREE.WebGLRenderer({ antialias: false, powerPreference: "high-performance" });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(1); 
        document.body.appendChild(renderer.domElement);

        const controls = new OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;
        controls.dampingFactor = 0.05;
        controls.enablePan = false;

        // --- 2. Precision Data Extractor ---
        function generateTerminalData() {
            const canvas = document.createElement('canvas');
            const cw = 1024; 
            const ch = 1024;
            canvas.width = cw; 
            canvas.height = ch;
            const ctx = canvas.getContext('2d');

            ctx.fillStyle = '#000000';
            ctx.fillRect(0, 0, cw, ch);
            
            // Draw with sub-pixel anti-aliasing off for sharp edges
            ctx.imageSmoothingEnabled = false;
            ctx.fillStyle = '#FFFFFF';
            
            ctx.font = 'bold 30px Courier New, monospace';
            ctx.fillText("ROBCO INDUSTRIES UNIFIED OPERATING SYSTEM", 60, 120);
            ctx.fillText("COPYRIGHT 2075-2077 ROBCO INDUSTRIES", 60, 160);
            ctx.fillText("-Server 1-", 60, 200);
            
            ctx.font = '22px Courier New, monospace';
            ctx.fillText("Compiling system memory...", 60, 280);
            ctx.fillText("System load................... OK", 60, 320);
            ctx.fillText("V.A.T.S. Targeting............ ONLINE", 60, 360);
            ctx.fillText("Pip-OS v7.1.0.8............... VERIFIED", 60, 400);
            ctx.fillText("Connecting to mainframe....... SECURE", 60, 440);
            
            ctx.font = 'bold 26px Courier New, monospace';
            ctx.fillText("> OVERRIDE PROTOCOL AUTHORIZED_", 60, 540);

            return ctx.getImageData(0, 0, cw, ch).data;
        }

        const imgData = generateTerminalData();
        const positions = [];
        const phases = [];
        const revealOrders = [];
        
        const cw = 1024;
        const ch = 1024;
        const step = 2; // Phosphor grid density
        
        let particleIndex = 0;

        for (let y = 0; y < ch; y += step) {
            for (let x = 0; x < cw; x += step) {
                const index = (y * cw + x) * 4;
                const r = imgData[index];

                if (r > 100) { 
                    // Snap to rigid grid
                    const nx = (x / cw) * 2 - 1;
                    const ny = -(y / ch) * 2 + 1;
                    
                    const spreadX = nx * 32;
                    const spreadY = ny * 32;

                    // Intense CRT Glass Curvature
                    const crtCurvature = 5.0;
                    const spreadZ = -((nx * nx) + (ny * ny)) * crtCurvature;

                    positions.push(spreadX, spreadY, spreadZ);
                    phases.push(Math.random() * Math.PI * 2); 
                    
                    // The chronological order this pixel was scanned (Top to Bottom, Left to Right)
                    revealOrders.push(particleIndex);
                    particleIndex++;
                }
            }
        }

        const geometry = new THREE.BufferGeometry();
        geometry.setAttribute('position', new THREE.Float32BufferAttribute(positions, 3));
        geometry.setAttribute('phase', new THREE.Float32BufferAttribute(phases, 1));
        geometry.setAttribute('revealOrder', new THREE.Float32BufferAttribute(revealOrders, 1));

        // --- 3. Elite CRT Shader (Typing + Vignette + Glitch) ---
        function createPhosphorTexture() {
            const canvas = document.createElement('canvas');
            canvas.width = 16; canvas.height = 16; 
            const ctx = canvas.getContext('2d');
            // Square texture to mimic physical CRT phosphors instead of round orbs
            ctx.fillStyle = 'rgba(255, 255, 255, 0.9)';
            ctx.fillRect(2, 2, 12, 12);
            ctx.fillStyle = 'rgba(255, 255, 255, 0.3)';
            ctx.fillRect(0, 0, 16, 16);
            return new THREE.CanvasTexture(canvas);
        }

        const uniforms = {
            uTime: { value: 0.0 },
            pointTexture: { value: createPhosphorTexture() },
            uBaseColor: { value: new THREE.Color(0x4af626) } 
        };

        const shaderMaterial = new THREE.ShaderMaterial({
            uniforms: uniforms,
            vertexShader: `
                precision mediump float;
                uniform float uTime;
                
                attribute float phase;
                attribute float revealOrder;
                
                varying float vOpacity;
                varying vec2 vUv;
                varying vec3 vPos;

                void main() {
                    vec3 pos = position;
                    vPos = pos;
                    
                    // Hardware Jitter
                    float glitch = step(0.99, sin(uTime * 3.0 + phase)) * sin(uTime * 40.0) * 0.3;
                    pos.x += glitch;

                    vec4 mvPosition = modelViewMatrix * vec4(pos, 1.0);
                    
                    // GPU TYPING ENGINE: Hides particles until uTime catches up to their revealOrder
                    float typeSpeed = 15000.0; // Particles revealed per second
                    float isVisible = step(revealOrder, uTime * typeSpeed);
                    
                    // Distant particles are slightly smaller
                    gl_PointSize = isVisible * (100.0 / -mvPosition.z);
                    
                    // Rolling scanline logic
                    vOpacity = 0.7 + 0.3 * sin(pos.y * 12.0 - uTime * 20.0);
                    vOpacity *= isVisible;
                    
                    gl_Position = projectionMatrix * mvPosition;
                }
            `,
            fragmentShader: `
                precision mediump float;
                uniform sampler2D pointTexture;
                uniform vec3 uBaseColor;
                
                varying float vOpacity;
                varying vec3 vPos;

                void main() {
                    // Vignette: Darken edges based on distance from center (vPos.x and vPos.y)
                    float distFromCenter = length(vPos.xy) / 25.0;
                    float vignette = smoothstep(1.2, 0.4, distFromCenter);
                    
                    // Chromatic separation simulation (tint edges slightly blue/red)
                    vec3 finalColor = uBaseColor;
                    if(distFromCenter > 0.6) {
                        finalColor.r += (distFromCenter - 0.6) * 0.5;
                        finalColor.b += (distFromCenter - 0.6) * 0.5;
                    }

                    gl_FragColor = vec4(finalColor, vOpacity * vignette) * texture2D(pointTexture, gl_PointCoord);
                }
            `,
            blending: THREE.AdditiveBlending,
            depthWrite: false,
            depthTest: false,
            transparent: true
        });

        const particleSystem = new THREE.Points(geometry, shaderMaterial);
        particleSystem.frustumCulled = false;
        scene.add(particleSystem);

        // --- 4. Interactive Mechanics ---
        let targetRotX = 0;
        let targetRotY = 0;
        const windowHalfX = window.innerWidth / 2;
        const windowHalfY = window.innerHeight / 2;

        function updateMouse(event) {
            let clientX = event.touches ? event.touches[0].clientX : event.clientX;
            let clientY = event.touches ? event.touches[0].clientY : event.clientY;
            targetRotY = ((clientX - windowHalfX) / windowHalfX) * 0.25;
            targetRotX = ((clientY - windowHalfY) / windowHalfY) * 0.25;
        }

        window.addEventListener('mousemove', updateMouse);
        window.addEventListener('touchmove', updateMouse, { passive: true });

        // --- 5. Core Engine Loop ---
        const clock = new THREE.Clock();

        function animate() {
            requestAnimationFrame(animate);
            const time = clock.getElapsedTime();
            uniforms.uTime.value = time;

            particleSystem.rotation.y += (targetRotY - particleSystem.rotation.y) * 0.08;
            particleSystem.rotation.x += (targetRotX - particleSystem.rotation.x) * 0.08;
            
            controls.update();
            renderer.render(scene, camera);
        }

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        animate();
    </script>
</body>
</html>
