<html lang="en">
<head>

    <title>Moon Squad RPG · Command Center</title>
    <style>
        :root {
            --bg: #050510;
            --card: rgba(20, 16, 50, 0.9);
            --border: rgba(138, 90, 220, 0.25);

            --purple: #8a5adc;
            --purple-light: #b388ff;
            --blue: #4fc3f7;
            --gold: #ffd54f;
            --red: #ef5350;
            --green: #66bb6a;
            --text: #e8e0ff;
            --dim: #7b6fa0;
            --dimmer: #3d3560;
        }

        body {
            margin: 0;
            font-family: 'Georgia', serif;
            background: radial-gradient(ellipse at 20% 50%, rgba(100,60,200,0.15) 0%, transparent 50%),
                        radial-gradient(ellipse at 80% 20%, rgba(60,100,200,0.1) 0%, transparent 50%),
                        radial-gradient(ellipse at 60% 80%, rgba(150,60,200,0.1) 0%, transparent 40%),
                        linear-gradient(135deg, #050510 0%, #0a0825 50%, #050510 100%);
            color: var(--text);
            min-height: 100vh;
        }

        .app-container { max-width: 480px; margin: 0 auto; position: relative; }

        .header {
            background: rgba(8, 6, 25, 0.97);
            padding: 10px 16px 8px;
            position: sticky;
            top: 0;
            z-index: 100;
            border-bottom: 1px solid var(--border-glow);
            box-shadow: 0 2px 20px rgba(138, 90, 220, 0.3);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .header-title { font-weight: bold; font-size: 0.95rem; color: #fff; letter-spacing: 2px; }
        .header-subtitle { font-size: 0.6rem; color: var(--dim); letter-spacing: 1px; font-family: Arial, sans-serif; }
        .purple-light { color: var(--purple-light); }

        .tabs {
            display: flex;
            background: rgba(8, 6, 25, 0.95);
            border-bottom: 1px solid var(--border);
            overflow-x: auto;
            scrollbar-width: none;
        }
        .tabs::-webkit-scrollbar { display: none; }

        .tab-btn {
            padding: 9px 11px;
            font-size: 0.65rem;
            color: var(--dim);
            cursor: pointer;
            white-space: nowrap;
            border: none;
            border-bottom: 2px solid transparent;
            background: transparent;
            flex-shrink: 0;
            transition: all 0.2s;
            font-family: Arial, sans-serif;
            text-transform: uppercase;
        }
        .tab-btn.active {
            color: var(--purple-light);
            border-bottom: 2px solid var(--purple);
            background: rgba(138, 90, 220, 0.1);
        }

        .panel { display: none; padding: 14px; }
        .panel.active { display: block; }

        .card {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 10px;
            padding: 14px;
            margin-bottom: 12px;
            box-shadow: 0 2px 15px rgba(0,0,0,0.4);
        }

        .section-title {
            font-size: 0.58rem;
            text-transform: uppercase;
            letter-spacing: 2.5px;
            color: var(--purple);
            margin-bottom: 8px;
            font-family: Arial, sans-serif;
        }

        .input, .select, .textarea {
            width: 100%;
            padding: 9px 11px;
            background: rgba(10, 8, 30, 0.8);
            border: 1px solid var(--border);
            border-radius: 6px;
            color: var(--text);
            font-size: 0.82rem;
            outline: none;
            box-sizing: border-box;
            font-family: Arial, sans-serif;
            margin-bottom: 10px;
        }
        .textarea { min-height: 70px; resize: vertical; }

        .label {
            display: block;
            font-size: 0.68rem;
            color: var(--dim);
            margin-bottom: 4px;
            font-family: Arial, sans-serif;
        }

        .btn {
            padding: 8px 16px;
            border-radius: 6px;
            border: 1px solid rgba(255,255,255,0.1);
            cursor: pointer;
            font-size: 0.78rem;
            font-weight: bold;
            background: var(--purple);
            color: #fff;
            font-family: Arial, sans-serif;
            width: 100%;
            margin-bottom: 8px;
        }

        .btn-sm {
            padding: 5px 10px;
            border-radius: 5px;
            border: 1px solid rgba(255,255,255,0.08);
            cursor: pointer;
            font-size: 0.68rem;
            font-weight: bold;
            background: var(--purple);
            color: #fff;
            font-family: Arial, sans-serif;
        }

        #rollVal {
            font-size: 2.5rem;
            font-weight: 900;
            text-align: center;
            padding: 20px;
            color: var(--purple-light);
            text-shadow: 0 0 15px var(--purple);
            font-family: Arial, sans-serif;
        }
    </style>
</head>

    {

        location: "Dark Enchanted Forest / Crumbling Kingdom outskirts",
        status: "Active",
        threat: "Extreme",
        color: "#9c27b0",
        glowColor: "rgba(156,39,176,0.2)",
        image: "🐺",
        tagline: "He was a man once. The Hollow made him something more useful.",
        appearance: `Eight feet of muscle, scar tissue, and grey-black fur that shifts colour in moonlight. His eyes are amber — too intelligent for an animal, too feral for a man. Three of his claws are longer than the others on his right hand. Nobody has successfully asked why.\n\nHe walks upright until he doesn’t want to anymore. In full hunt mode, he drops to four legs and covers ground at a speed that doesn’t match his size. The Hollow has given him something extra. Whatever it is, it shows in how he moves — like he knows where you’re going before you do.`, 
        lore: `Gravenor was a Warrior. The records from before his transformation are incomplete — the Crumbling Kingdom archived its heroes badly and its tragedies not at all. What survives: he was stationed at the Forest’s edge, part of a unit tasked with containing whatever was coming out of the dark.\n\nThe unit didn’t come back. Gravenor did.\n\nHe wasn’t feral immediately. There are accounts from the early period — a figure seen at the tree line, watching villages without approaching. A garrison that found their gate intact one morning after something had been circling it all night. A survivor who said something spoke to them in the dark, warned them away from a particular path, and was gone before they could see it clearly.\n\nWhatever the Hollow did to him, it kept something. That something makes him more dangerous than a simple beast. He plans. He remembers. He holds grudges across sessions with the precision of someone who has kept score for a long time.\n\nThe Ashen Pack follows him — wolves touched by the same Hollow influence, not transformed fully but changed enough. They don’t obey him. They agree with him. That distinction matters when you’re trying to split the group.`, 
        motivation: `Gravenor is not trying to destroy the players. He is trying to reclaim something — what exactly shifts by arc, but the core is consistent: he believes the Hollow took something from him and he intends to have it back. The players are obstacles, witnesses, or occasionally tools depending on what they’ve done and who they’ve aligned with.\n\nHe is not without honour. He will not attack someone who is downed unless they wronged him directly. He has left warnings. He has, on two documented occasions, healed an injured character who was not his target. The Hollow made him a monster. It didn’t make him cruel.`,
        strengths: ["Regenerates 2 HP per round while in Forest or low-light environments","Cannot be flanked — senses positions of all characters within 40 feet","Pack Coordination — Ashen wolves gain +1 attack when Gravenor is above half HP","Hollow-Hardened — standard weapons deal -1 damage. Hollow-touched weapons deal full","Tracking — if he has scented a character once, he can find them anywhere in the Forest","Intimidation Aura — characters at 3 HP or below must roll WIS 12+ to act aggressively"],
        weaknesses: ["Silver — silver weapons bypass Hollow-Hardened and deal +2 damage","Fire — cannot regenerate during rounds where fire damage was received","Bard performance in Hollow locations — the Hollow’s connection makes him briefly hesitate","His honour — cannot pursue a character who formally surrenders in Pack tradition (kneel, arms wide)","The thing he lost — if it is present or mentioned specifically, he loses one action to re-orient","Daylight on open ground — -1 to all rolls, regeneration halved"],
        phases: [
            {phase: 1, name: "The Watcher", hp: "Full — 80 HP", desc: "Gravenor observes. Doesn’t engage directly. Directs pack. Tests player responses. Will speak if approached respectfully.", behavior: "Circles. Herds. Creates pressure without striking. Players who act with honour may trigger a dialogue event.", color: "#4fc3f7"},
            {phase: 2, name: "The Hunter", hp: "Below 60 HP", desc: "Engages directly. Targets the player who has done the most damage to his pack. Precise, tactical strikes.", behavior: "Picks a primary target and focuses them. Other pack members create interference. Will retreat wounded characters from the fight — he doesn’t kill until Phase 3.", color: "#ff9800"},
            {phase: 3, name: "The Feral", hp: "Below 30 HP", desc: "The man recedes. The Hollow takes over. Reckless, devastating, and no longer strategic.", behavior: "Attacks nearest character regardless of tactical value. Pack members scatter — no longer coordinated. Maximum damage output. Hollow regeneration doubles.", color: "#ef5350"},
            {phase: 4, name: "The Reckoning", hp: "At 0 HP — but not dead", desc: "Gravenor does not die easily. At 0 HP he collapses — and the man surfaces. One round of lucidity. He speaks. What he says is arc-relevant.", behavior: "Players can choose to finish him, let him go, or attempt something else. All three options have permanent consequences. The Hollow is watching this moment specifically.", color: "#ce93d8"}

        abilities: [

            {name: "The Hollow’s Gift", type: "Passive — Phase 3 only", desc: "The Hollow pushes through him. All damage dealt by Gravenor in Phase 3 ignores 2 points of DEF and cannot be reduced below 2."}

        lootDrops: [
            { item: "Ashen Fang (weapon enchantment material)", chance: "65%", note: "Counts as silver for purposes of other werewolf encounters. Rare enchantment component." },
            { item: "Pack Sigil (faction key item)", chance: "80%", note: "Opens certain Ashen Pack territories and caches. Some NPCs will react to it." },

    {
        id: "valdris",
        name: "Valdris the Unmourned",
        title: "Last Chancellor of the Crumbling Kingdom",
        type: "Undead Political Villain — Arc Boss",
        arc: "Arc II — The Kingdom’s Debt",

        status: "Active",
        threat: "High",
        color: "#ef5350",
        glowColor: "rgba(239,83,80,0.15)",
        image: "👑",
        tagline: "The Kingdom fell. He didn’t have the decency to go with it.",
        appearance: `Valdris looks like what he was — a chancellor, a political animal, a man who spent forty years in rooms where appearance was currency. The suit is still pressed. The rings are still on the fingers. The eyes are still calculating.\n\nEverything else is wrong. His skin has the grey-yellow quality of old candle wax. He moves without sound. His shadow doesn’t always match his position. When he speaks, the temperature drops — not dramatically, not like a horror story, just enough that you notice and wish you hadn’t.\n\nHe was the last person out of the Kingdom before it fell. He made sure of it by ensuring everyone else went first.`, 
        lore: `Valdris didn’t cause the Kingdom’s collapse. He facilitated it. There’s a distinction he would insist on, and he would be technically correct, and the distinction would be meaningless.\n\nHe spent his chancellorship building leverage. Favours owed, secrets held, alliances that looked like loyalty and functioned like ownership. When the collapse came — and he had known it was coming for three years — he had prepared an exit for himself that required sacrificing every connection he’d spent a career building.\n\nHe made the trades. They worked. The Kingdom fell. He walked out.\n\nWhat he didn’t account for was the Hollow. The Hollow has opinions about certain kinds of debts. Valdris arrived at the Hollow’s Edge planning to establish himself in whatever came next. Instead, he found he couldn’t leave. The Hollow had noted the accounting.\n\nHe has been in the throne room ever since — not imprisoned, not restrained, but unable to pass through the Kingdom’s ruins without returning. The Hollow keeps him here because the debts he created are still active. He cannot leave until they’re settled. His interpretation of “settled” is not the Hollow’s.`, 
        motivation: `Valdris wants out. He wants the Hollow’s accounting cleared, which means either legitimately settling the debts (which would require sacrificing things he values more than freedom) or finding someone else to transfer them to.\n\nHe is actively recruiting. He presents himself as an ally, a guide, a source of Kingdom intelligence. Everything he says is technically true. The framing is consistently in his interest. He is extraordinarily good at this — forty years of practice.\n\nHe will betray anyone. He has done it before. He will do it without visible guilt because he has genuinely convinced himself that his survival matters more than other people’s stories. The Hollow disagrees. This disagreement is the arc.`,
        strengths: ["Political Intelligence — knows the history, weaknesses, and leverage points of every Kingdom faction","The Hollow’s Grudge — immune to all damage while inside the throne room. The Hollow keeps him here intact","Debt Transfer — can apply a Debt consequence to any character who accepts a deal with him","Undying — cannot be permanently killed until his debts are settled. Defeated characters respawn him next session","The Long Memory — remembers every action taken by every character, uses this in future negotiations","Plausible Deniability — NPCs require CHA roll 15+ to believe accusations against him without evidence"],
        weaknesses: ["Outside the Kingdom ruins, his powers are significantly reduced — -2 all rolls","His debts — specific items, returned to specific people, weaken him permanently","Direct honesty — he cannot lie outright, only mislead. Characters with Truthseer or similar detect this","The Hollow’s accounting — certain Hollow locations make him visibly uncomfortable and reduce his DEF","He needs the players — without someone to transfer debt to, he cannot leave. This makes him tractable","His suits — they are actual armour. Destroying one is a genuine injury to his dignity and his DEF"],
        phases: [
            {phase: 1, name: "The Chancellor", hp: "Full — 60 HP", desc: "Diplomatic. Charming. Genuinely helpful — selectively. Building trust to spend later.", behavior: "Offers information, assistance, access. Every offer has a cost he doesn’t mention upfront. Monitors what the players value.", color: "#4fc3f7"},
            {phase: 2, name: "The Negotiator", hp: "Below 45 HP", desc: "The charm remains but the desperation shows. Offers become better and the costs become worse.", behavior: "Starts making deals he can’t honour. Attempts to set players against each other. Uses what he’s learned about their motivations.", color: "#ff9800"},
            {phase: 3, name: "The Unmourned", hp: "Below 20 HP", desc: "Drops the political façade. What’s underneath is the man who watched a Kingdom die and felt primarily relieved.", behavior: "Direct. Vicious. Uses every piece of leverage he has simultaneously. The Hollow actively interferes with him at this point — small things going wrong.", color: "#ef5350"}
        ],
        abilities: [
            {name: "The Offer", type: "Social — once per session", desc: "Presents a deal. If accepted, player gains an immediate benefit and Valdris gains a Debt token on them. Three Debt tokens and the Hollow treats them as owing Valdris — consequences follow."},
            {name: "Kingdom Archive", type: "Passive", desc: "Knows the location of all Kingdom-era caches, vaults, and secrets. Will trade this information. The information is always accurate. The context is never complete."},
            {name: "Political Leverage", type: "Active", desc: "Once per arc, reveal something true and damaging about any player character. The revelation is arc-relevant and cannot be refuted."},
            {name: "Undying Patience", type: "Passive", desc: "If defeated, returns next session at half HP. Cannot be permanently removed until specific arc conditions are met."},
            {name: "The Debt Collector", type: "Phase 2+", desc: "Call in any outstanding Debt tokens simultaneously. All affected players must deal with the consequences in the same session."}

        lootDrops: [
            { item: "Kingdom Vault Key (arc item)", chance: "75%", note: "Opens the Kingdom’s remaining treasury and archive. High value, multiple uses." },
            { item: "Debt Ledger (faction item)", chance: "60%", note: "Contains records of every debt he created. Can be used to leverage Kingdom-era NPCs." },
            { item: "Chancellor’s Ring (enchantment item)", chance: "40%", note: "Applies Political Leverage ability to the wearer once per arc. It knows things." },
            { item: "Settled Accounts (arc resolution)", chance: "100% — arc condition", note: "When his debts are legitimately cleared, he dissolves. This is the actual win condition." },

        dmNotes: "Valdris is a puzzle, not a combat encounter. The players who try to fight him in the throne room will fail — the Hollow keeps him intact there. The solution is settling his debts, which requires understanding what they are. He will never tell them directly. The Debt Ledger is the key.",

    {

        image: "🌊",
        tagline: "It didn’t sink the Library. It was why the Library was built there.",
        appearance: `Nobody has seen The Sink clearly. What has been documented: a presence in the deep water, a distortion of light at the bottom of the lowest reading room, a sound that isn’t quite sound that increases in intensity as depth increases.\n\nCharacters who have reached the deep levels describe it differently — some report a shape, some report a feeling, some report words in a language they understood perfectly and cannot remember afterward. Three researchers who reached the bottom level left their notes on the final stair. None of them came back up. The notes are coherent. They do not describe The Sink. They describe what they thought about on the way down.`, 
        lore: `The Sunken Library was built on this location because of what was already here. The original founders believed that proximity to The Sink made knowledge more accessible — that the entity at the bottom had a relationship with information that could be leveraged for scholarship.\n\nThey were correct. The Library became the most complete archive in the Hollow Realm’s history. The founders’ notes on what they negotiated for this are in the restricted section. The restricted section is flooded.\n\nThe Sink has not acted aggressively. It has not acted at all in any observable sense. But the Library keeps sinking — a few inches per decade — and the water level keeps rising, and the lowest rooms keep becoming inaccessible, and occasionally a researcher who goes too deep doesn’t come back up but their notes do.\n\nThe Hollow considers The Sink to be something it keeps an eye on. This is, to scholars who understand the Hollow’s usual attitude toward things, extremely significant.`, 
        motivation: `Unknown. Possibly not goal-oriented in a way that translates to motivation. The working theory among the Library’s remaining scholars is that The Sink is collecting — absorbing the knowledge in the drowned sections, pulling information down as the water rises.\n\nWhat it intends to do with a complete archive of the Hollow Realm’s history is the question the current arc is asking.`,
        strengths: ["Omniscience (partial) — knows everything in the drowned Library sections","Water domain — in flooded areas, all enemy rolls are at -2 and The Sink’s effective HP is doubled","Unknowable — cannot be damaged by conventional means in deep water","The Pull — characters below the second submerged level must roll WIS 12+ each round or drift one level deeper","The Drowned — animated researchers who went too deep. They are not hostile. They are very insistent.","Information Weapon — can reveal any character’s secrets, Shadow Traits, or Destiny Threads as an action"],
        weaknesses: ["Surface — above water, its power is significantly reduced","Light — sustained magical light sources reduce The Pull effect by half","Direct questions — it answers them. Always. The answers are true. The answers are not always safe","The first archive — the founding documents, if recovered, describe a counter-condition","Acknowledgment — has never been directly addressed. Nobody knows what happens if someone tries"],
        phases: [
            {phase: 1, name: "The Archive", hp: "Inapplicable", desc: "Passive. Characters feel its presence as increasing unease. The water rises slightly. Notes appear on desks.", behavior: "Provides information freely to any character who asks. The information is accurate and contextless and devastating.", color: "#4fc3f7"},
            {phase: 2, name: "The Collector", hp: "Emerges partially — 100 HP", desc: "Responds to characters reaching the deep levels. The shape becomes visible. The Pull intensifies.", behavior: "Not attacking — cataloguing. Characters feel themselves being read. Shadow Traits and Destiny Threads activate involuntarily.", color: "#9c27b0"},
            {phase: 3, name: "The Answer", hp: "Unknown — damage causes it to recede, not die", desc: "Direct confrontation. It has questions for the players. The session becomes a conversation with something vast.", behavior: "Asks one question of each character. The questions are about their Destiny Threads. Answering honestly gives +3 to all rolls for the session. Lying causes a permanent consequence.", color: "#ce93d8"}
        ],
        abilities: [

            {name: "The Drowned Scholars", type: "Active", desc: "Summons 1d6 animated researchers. They do not attack. They approach calmly and attempt to lead characters deeper. Resisting requires STR or SPD roll 13+."},
            {name: "Information Flood", type: "Active — once per session", desc: "Overwhelms one character with everything it knows about them. Target loses their next action and gains a permanent piece of arc-relevant knowledge."},
            {name: "The Rising", type: "Environmental", desc: "Water level rises 6 inches per round during Phase 2+. Sessions in the Library have a time limit."},
            {name: "True Answer", type: "Phase 3 only", desc: "Answers any question asked of it completely and accurately. The answer always contains something the character was not prepared for."}

        lootDrops: [

            { item: "The Sink’s attention (consequence)", chance: "Phase 2 — automatic", note: "It knows your character now. This has future implications across arcs." },
            { item: "Founding Document (arc key item)", chance: "40%", note: "Describes the original negotiation. Contains the counter-condition. Changes the arc significantly." },
            { item: "Waterlogged Enchantment Scroll", chance: "35%", note: "Contains a Hollow-adjacent spell not found anywhere else. Partially damaged — requires Wizard to complete." },
            { item: "The Answer (arc resolution)", chance: "Phase 3 — conditional", note: "If all characters answer honestly, The Sink recedes fully. The Library stops sinking. This is the win condition." }
        ],
        dmNotes: "The Sink is not a villain in the traditional sense — it’s a force that the players have to understand, not defeat. The arc resolves through honesty, not combat. Characters who engage with it combatively waste resources and miss the point. Characters who ask it questions learn things they needed to know. The session where players realise what it actually wants is the session the arc is built toward.",
    },

// ── TAB NAVIGATION ──

function switchTab(tabId) {
    // 1. Hide all panels
    const panels = document.querySelectorAll('.panel');
    panels.forEach(p => p.style.display = 'none');
    
    // 2. Deactivate all buttons
    const buttons = document.querySelectorAll('.tab-btn');
    buttons.forEach(b => b.classList.remove('active'));
    
    // 3. Show the one we want
    const targetPanel = document.getElementById('tab-' + tabId);
    if (targetPanel) {
        targetPanel.style.display = 'block';
    }

    // 4. Find the button that was clicked and make it active
    // We search by text to be 100% sure we find the right one
    buttons.forEach(b => {
        if (b.getAttribute('onclick').includes(tabId)) {
            b.classList.add('active');
        }
    });

    // 5. Run the specific render functions
    if (tabId === 'classes') renderClasses();
    if (tabId === 'arsenal') renderArsenal();
    if (tabId === 'bestiary') renderBestiary();
    if (tabId === 'npcs') renderNpcs();
    if (tabId === 'villains') renderVillains();
    if (tabId === 'rules') {
        if (typeof initRules === 'function') initRules();
        else renderRules();
    }
    if (tabId === 'ref') renderRef();
}

            v.phases.forEach(ph => {

                    <div style="display:flex; justify-content:space-between; align-items:flex-start; margin-bottom:8px;">
                        <div>
                            <div style="font-weight:bold; color:${ph.color}; font-size:0.9rem;">Phase ${ph.phase} — ${ph.name}</div>
                            <div style="font-size:0.68rem; color:#888; font-family:Arial,sans-serif; margin-top:2px;">${ph.hp}</div>
                        </div>
                        <div style="width:12px; height:12px; border-radius:50%; background:${ph.color}; box-shadow:0 0 8px ${ph.color}; flex-shrink:0; margin-top:4px;"></div>
                    </div>
                    <div style="font-size:0.75rem; color:var(--text); margin-bottom:8px; font-family:Arial,sans-serif;">${ph.desc}</div>
                    <div style="background:rgba(10,8,30,0.6); border-radius:6px; padding:8px 10px; border-left:2px solid ${ph.color}60;">
                        <div style="font-size:0.62rem; color:${ph.color}; text-transform:uppercase; letter-spacing:1.5px; margin-bottom:4px; font-family:Arial,sans-serif;">Behavior</div>
                        <div style="font-size:0.72rem; color:var(--dim); line-height:1.6; font-family:Arial,sans-serif;">${ph.behavior}</div>
                    </div>
                </div>`;
            });
        } else if (villainLoreSection === 'abilities') {
            html += `<div class="card"><div class="section-title">Abilities & Powers</div>`;
            v.abilities.forEach(a => {
                html += `<div style="padding:10px 0; border-bottom:1px solid var(--dimmer);">
                    <div style="display:flex; justify-content:space-between; align-items:baseline; margin-bottom:4px;">
                        <span style="font-weight:bold; color:${v.color}; font-size:0.82rem;">${a.name}</span>
                        <span style="font-size:0.62rem; color:var(--dim); font-family:Arial,sans-serif;">${a.type}</span>
                    </div>
                    <div style="font-size:0.73rem; color:var(--dim); line-height:1.6; font-family:Arial,sans-serif;">${a.desc}</div>
                </div>`;
            });
            html += `</div>`;
        } else if (villainLoreSection === 'loot') {
            html += `<div class="card"><div class="section-title">💰 Loot Drop Table</div>`;
            v.lootDrops.forEach(l => {
                html += `<div style="padding:10px 0; border-bottom:1px solid var(--dimmer);">
                    <div style="display:flex; justify-content:space-between; align-items:flex-start; margin-bottom:4px;">
                        <span style="font-size:0.78rem; color:var(--text); font-family:Arial,sans-serif; flex:1;">${l.item}</span>
                        <span style="font-size:0.88rem; font-weight:bold; font-family:Arial,sans-serif; margin-left:10px; flex-shrink:0; color:${l.chance.includes('100') ? 'var(--gold)' : l.chance.includes('conditional') ? '#ce93d8' : parseInt(l.chance)>=60 ? 'var(--green)' : parseInt(l.chance)>=35 ? 'var(--gold)' : parseInt(l.chance)>=20 ? 'var(--blue)' : '#ce93d8'};">${l.chance}</span>
                    </div>
                    <div style="font-size:0.68rem; color:#888; line-height:1.5; font-family:Arial,sans-serif; font-style:italic;">${l.note}</div>
                </div>`;
            });
            html += `</div>`;
        } else if (villainLoreSection === 'dm') {
            html += `<div style="background:rgba(30,20,10,0.9); border:1px solid var(--gold)30; border-radius:10px; padding:16px; box-shadow:0 0 15px rgba(255,213,79,0.05);">
                <div style="font-size:0.62rem; color:var(--gold); text-transform:uppercase; letter-spacing:2px; margin-bottom:10px; font-family:Arial,sans-serif;">🎭 DM Eyes Only</div>
                <div style="font-size:0.78rem; color:#ccc; line-height:1.8; font-family:Arial,sans-serif;">${v.dmNotes}</div>
            </div>`;
        }
        container.innerHTML = html;
    }
}

// ═══════════════════════════════════════════════════
// NPCs ENGINE
// ═══════════════════════════════════════════════════
function renderNpcs() {
    const searchInput = document.getElementById('npcSearch');
    const s = searchInput ? searchInput.value.toLowerCase() : "";
    const container = document.getElementById('npcContainer');

    let html = `
        <div style="display:flex; gap:8px; margin-bottom:12px;">
            <input class="input" style="flex:1; margin:0;" id="npcSearch" placeholder="🔍 Search NPCs..." value="${s}" onkeyup="renderNpcs()">
            <button class="btn" style="width:auto; margin:0;" onclick="openNpcEditor('new')">+ NPC</button>
        </div>
    `;

    if (state.npcs.length === 0) {
        html += `<div style="text-align:center; color:var(--dimmer); padding:50px 16px; font-size:0.82rem;"><div style="font-size:2rem; margin-bottom:10px;">👁</div><div>No NPCs recorded yet.</div></div>`;
    } else {
        state.npcs.filter(n => !s || n.name.toLowerCase().includes(s) || n.fac.toLowerCase().includes(s)).forEach(npc => {
            const disp = NPC_DISPOSITIONS[npc.disp] || NPC_DISPOSITIONS.neutral;
            const stat = NPC_STATUSES[npc.status] || NPC_STATUSES.active;
            
            html += `
            <div class="card" style="border:1px solid ${disp.color}40; opacity:${npc.status === 'dead' ? 0.45 : 1};">
                <div style="display:flex; justify-content:space-between; align-items:flex-start;">
                    <div>
                        <div style="font-weight:bold; font-size:0.95rem; color:#fff;">${disp.icon} ${npc.name}</div>
                        <div style="font-size:0.65rem; color:var(--purple); text-transform:uppercase; letter-spacing:1px; font-family:Arial,sans-serif; margin-top:2px;">${npc.fac}</div>
                        ${npc.location ? `<div style="font-size:0.65rem; color:var(--dim); font-family:Arial,sans-serif;">📍 ${npc.location}</div>` : ''}
                    </div>
                    <div style="display:flex; flex-direction:column; align-items:flex-end; gap:4px;">
                        <span style="font-size:0.6rem; padding:2px 8px; border-radius:10px; background:${disp.bg}; color:${disp.color}; font-weight:bold; font-family:Arial,sans-serif;">${disp.label}</span>
                        <span style="font-size:0.6rem; padding:2px 8px; border-radius:10px; background:rgba(10,8,30,0.8); color:${stat.color}; font-family:Arial,sans-serif;">${stat.label}</span>
                    </div>
                </div>
                ${npc.notes ? `<div style="font-size:0.7rem; color:#888; margin-top:8px; line-height:1.5; font-family:Arial,sans-serif; border-left:2px solid ${disp.color}50; padding-left:8px;">${npc.notes}</div>` : ''}
                
                ${npc.relationships && npc.relationships.length > 0 ? `
                <div style="margin-top:8px;">
                    <div style="font-size:0.6rem; color:var(--dim); text-transform:uppercase; letter-spacing:1.5px; margin-bottom:4px; font-family:Arial,sans-serif;">Player Memory</div>
                    ${npc.relationships.map(r => `
                        <div style="display:flex; justify-content:space-between; padding:4px 0; border-bottom:1px solid var(--dimmer); font-size:0.68rem; font-family:Arial,sans-serif;">
                            <span style="color:var(--purple-light);">@${r.player}</span>
                            <span style="color:#888; max-width:65%; text-align:right;">${r.memory}</span>
                        </div>
                    `).join('')}
                </div>` : ''}
                <button class="btn-sm" style="background:rgba(138,90,220,0.15); color:var(--purple-light); margin-top:10px;" onclick="openNpcEditor(${npc.id})">Edit</button>
            </div>`;
        });
    }
    container.innerHTML = html;
    
    const newSearchInput = document.getElementById('npcSearch');
    if (s && newSearchInput) {
        newSearchInput.focus();
        newSearchInput.setSelectionRange(newSearchInput.value.length, newSearchInput.value.length);
    }
}

function openNpcEditor(id) {
    let n = id === 'new' ? {id: Date.now(), name:"", fac:"", location:"", disp:"neutral", status:"active", notes:"", relationships:[]} : state.npcs.find(x => x.id === id);
    if (!n.relationships) n.relationships = [];
    
    // Store temp data on the window object so we can add memory rows dynamically without saving to DB yet
    window.tempNpc = JSON.parse(JSON.stringify(n));

    renderNpcModal(id === 'new');
}

function renderNpcModal(isNew) {
    let n = window.tempNpc;
    const existingModal = document.getElementById('npcModal');
    if (existingModal) existingModal.remove();

    const modalHtml = `
        <div id="npcModal" style="position:fixed; inset:0; background:rgba(2,1,15,0.97); z-index:200; overflow-y:auto; padding:16px;">
            <div style="background:rgba(15,12,40,0.99); border:1px solid var(--border-glow); border-radius:12px; padding:18px; max-width:500px; margin:auto; margin-top:20px;">
                <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:16px;">
                    <div style="font-weight:bold; font-size:0.95rem; color:#fff;">${isNew ? '👁 New NPC' : '👁 Edit — ' + n.name}</div>
                    <button style="background:none; border:none; color:var(--dim); font-size:1.2rem; cursor:pointer;" onclick="document.getElementById('npcModal').remove()">✕</button>
                </div>
                
                <label class="label">Name</label>
                <input class="input" id="editNpcName" value="${n.name}" onchange="window.tempNpc.name=this.value" placeholder="NPC name...">
                
                <label class="label">Faction</label>
                <select class="select" id="editNpcFac" onchange="window.tempNpc.fac=this.value">
                    <option value="">— Select Faction —</option>
                    ${NPC_FACTIONS.map(f => `<option value="${f}" ${n.fac === f ? 'selected' : ''}>${f}</option>`).join('')}
                </select>

                <label class="label">Location</label>
                <input class="input" id="editNpcLoc" value="${n.location || ''}" onchange="window.tempNpc.location=this.value" placeholder="Where are they now...">
                
                <label class="label">Disposition</label>
                <select class="select" id="editNpcDisp" onchange="window.tempNpc.disp=this.value">
                    ${Object.keys(NPC_DISPOSITIONS).map(k => `<option value="${k}" ${n.disp === k ? 'selected' : ''}>${NPC_DISPOSITIONS[k].label}</option>`).join('')}
                </select>

                <label class="label">Status</label>
                <select class="select" id="editNpcStatus" onchange="window.tempNpc.status=this.value">
                    ${Object.keys(NPC_STATUSES).map(k => `<option value="${k}" ${n.status === k ? 'selected' : ''}>${NPC_STATUSES[k].label}</option>`).join('')}
                </select>
                
                <label class="label">Notes</label>
                <textarea class="textarea" id="editNpcNotes" onchange="window.tempNpc.notes=this.value" placeholder="Who are they, what do they want...">${n.notes}</textarea>
                
                <div class="section-title" style="margin-top:12px;">Player Memory</div>
                ${n.relationships.map((r, i) => `
                    <div style="display:flex; gap:6px; margin-bottom:6px; align-items:center;">
                        <input class="input" style="flex:0 0 100px; margin-bottom:0;" value="${r.player}" onchange="window.tempNpc.relationships[${i}].player=this.value" placeholder="@username">
                        <input class="input" style="flex:1; margin-bottom:0;" value="${r.memory}" onchange="window.tempNpc.relationships[${i}].memory=this.value" placeholder="What they remember...">
                        <button style="background:none; border:none; color:var(--dim); cursor:pointer;" onclick="window.tempNpc.relationships.splice(${i},1); renderNpcModal(${isNew})">✕</button>
                    </div>
                `).join('')}
                <button class="btn-sm" style="background:rgba(138,90,220,0.15); color:var(--purple-light); margin-bottom:16px; margin-top:6px;" onclick="window.tempNpc.relationships.push({player:'', memory:''}); renderNpcModal(${isNew})">+ Add Player Memory</button>

                <div style="display:flex; gap:8px; flex-wrap:wrap;">
                    <button class="btn" style="width:auto; flex:1;" onclick="saveNpc(${isNew})">✦ Save</button>
                    ${!isNew ? `<button class="btn" style="width:auto; background:rgba(60,10,10,0.8); color:var(--red);" onclick="deleteNpc(${n.id})">Remove</button>` : ''}
                    <button class="btn" style="width:auto; background:rgba(20,16,50,0.8); color:var(--dim);" onclick="document.getElementById('npcModal').remove()">Cancel</button>
                </div>
            </div>
        </div>
    `;
    document.body.insertAdjacentHTML('beforeend', modalHtml);
}

function saveNpc(isNew) {
    // Manually grab the final values in case they typed without blurring
    window.tempNpc.name = document.getElementById('editNpcName').value;
    window.tempNpc.fac = document.getElementById('editNpcFac').value;
    window.tempNpc.location = document.getElementById('editNpcLoc').value;
    window.tempNpc.notes = document.getElementById('editNpcNotes').value;

    if (!window.tempNpc.name.trim()) return alert("Name required.");

    if (isNew) {
        state.npcs.unshift(window.tempNpc);
    } else {
        const idx = state.npcs.findIndex(x => x.id === window.tempNpc.id);
        if (idx !== -1) state.npcs[idx] = window.tempNpc;
    }

    saveState();
    document.getElementById('npcModal').remove();
    renderNpcs();
}

function deleteNpc(id) {
    if (confirm("Remove NPC?")) {
        state.npcs = state.npcs.filter(x => x.id !== id);
        saveState();
        document.getElementById('npcModal').remove();
        renderNpcs();
    }
}


// ═══════════════════════════════════════════════════
// VILLAINS ENGINE
// ═══════════════════════════════════════════════════
function renderVillains() {
    const container = document.getElementById('villainContainer');
    
    let html = `
        <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:12px;">
            <div style="font-size:0.7rem; color:var(--dim); font-family:Arial,sans-serif;">${state.villains.length} villain${state.villains.length !== 1 ? 's' : ''} tracked</div>
            <button class="btn" style="width:auto; margin:0;" onclick="openVillainEditor('new')">+ Villain</button>
        </div>
    `;

    if (state.villains.length === 0) {
        html += `<div style="text-align:center; color:var(--dimmer); padding:50px 16px; font-size:0.82rem;"><div style="font-size:2rem; margin-bottom:10px;">🎭</div><div>No villains yet.</div><div style="font-size:0.7rem; margin-top:6px; color:var(--dim);">The Hollow is quiet. For now.</div></div>`;
    } else {
        state.villains.forEach(v => {
            const stat = VILLAIN_STATUSES[v.status] || VILLAIN_STATUSES.active;
            const hpPct = Math.max(0, (v.hp / v.maxHp) * 100);
            const hpColor = hpPct > 60 ? "#ef5350" : hpPct > 30 ? "#ff9800" : "#ffd54f";
            const phaseColor = VILLAIN_PHASE_COLORS[(v.phase - 1) % VILLAIN_PHASE_COLORS.length];

            html += `
            <div class="card" style="background:rgba(20,8,8,0.9); border:1px solid ${stat.color}40; opacity:${v.status === 'defeated' ? 0.5 : 1};">
                <div style="display:flex; justify-content:space-between; align-items:flex-start; margin-bottom:10px;">
                    <div>
                        <div style="font-weight:bold; font-size:1rem; color:#fff;">${v.name}</div>
                        ${v.title ? `<div style="font-size:0.7rem; color:${stat.color}; font-style:italic; font-family:Arial,sans-serif;">${v.title}</div>` : ''}
                        ${v.arc ? `<div style="font-size:0.65rem; color:var(--dim); font-family:Arial,sans-serif;">Arc: ${v.arc}</div>` : ''}
                    </div>
                    <div style="display:flex; flex-direction:column; align-items:flex-end; gap:4px;">
                        <span style="font-size:0.6rem; padding:2px 8px; border-radius:10px; background:${stat.bg}; color:${stat.color}; font-weight:bold; font-family:Arial,sans-serif;">${stat.label}</span>
                        <span style="font-size:0.6rem; padding:2px 8px; border-radius:10px; background:${phaseColor}20; color:${phaseColor}; font-family:Arial,sans-serif;">Phase ${v.phase}</span>
                    </div>
                </div>
                
                <div style="margin-bottom:10px;">
                    <div style="display:flex; justify-content:space-between; font-size:0.65rem; color:var(--dim); margin-bottom:3px; font-family:Arial,sans-serif;"><span>Threat HP</span><span style="color:${hpColor}; font-weight:bold;">${v.hp} / ${v.maxHp}</span></div>
                    <div style="height:8px; background:rgba(255,255,255,0.05); border-radius:4px; overflow:hidden;">
                        <div style="height:100%; width:${hpPct}%; background:linear-gradient(90deg,${hpColor},${hpColor}99); border-radius:4px; box-shadow:0 0 10px ${hpColor}; transition:width 0.4s;"></div>
                    </div>
                    <div style="display:flex; gap:5px; margin-top:6px;">
                        ${[-20, -10, -5].map(d => `<button class="btn-sm" style="background:rgba(60,10,10,0.8); color:#ef5350;" onclick="adjustVillainHp(${v.id}, ${d})">${d}</button>`).join('')}
                        <div style="flex:1;"></div>
                        ${[5, 10, 20].map(d => `<button class="btn-sm" style="background:rgba(10,40,10,0.8); color:#66bb6a;" onclick="adjustVillainHp(${v.id}, ${d})">+${d}</button>`).join('')}
                    </div>
                </div>

                <div style="display:flex; gap:6px; margin-bottom:10px; align-items:center; flex-wrap:wrap;">
                    <span style="font-size:0.65rem; color:var(--dim); font-family:Arial,sans-serif;">Phase:</span>
                    ${[1,2,3,4].map(p => `
                        <button class="btn-sm" style="background:${v.phase === p ? VILLAIN_PHASE_COLORS[p-1]+'30' : 'rgba(10,8,30,0.8)'}; color:${v.phase === p ? VILLAIN_PHASE_COLORS[p-1] : 'var(--dim)'}; border:1px solid ${v.phase === p ? VILLAIN_PHASE_COLORS[p-1] : 'var(--border)'};" onclick="setVillainPhase(${v.id}, ${p})">${p}</button>
                    `).join('')}
                    <div style="flex:1;"></div>
                    <select class="select" style="width:auto; margin:0; padding:4px 8px; font-size:0.65rem;" onchange="setVillainStatus(${v.id}, this.value)">
                        ${Object.keys(VILLAIN_STATUSES).map(k => `<option value="${k}" ${v.status === k ? 'selected' : ''}>${VILLAIN_STATUSES[k].label}</option>`).join('')}
                    </select>
                </div>

                ${v.weakness ? `<div style="background:rgba(255,213,79,0.05); border:1px solid rgba(255,213,79,0.2); border-radius:6px; padding:6px 10px; margin-bottom:8px; font-size:0.7rem; color:#ffd54f; font-family:Arial,sans-serif;">⚠ Weakness: ${v.weakness}</div>` : ''}
                
                ${v.crimes && v.crimes.length > 0 ? `
                <div style="margin-bottom:8px;">
                    <div style="font-size:0.6rem; color:var(--dim); text-transform:uppercase; letter-spacing:1.5px; margin-bottom:4px; font-family:Arial,sans-serif;">What They’ve Done</div>
                    ${v.crimes.map(c => `
                        <div style="display:flex; gap:8px; padding:4px 0; border-bottom:1px solid var(--dimmer); font-size:0.7rem; font-family:Arial,sans-serif;">
                            <span style="color:#ef5350; flex-shrink:0;">✦</span>
                            <span style="color:#ccc;">${c.victim ? `<span style="color:#b388ff;">@${c.victim} — </span>` : ''}${c.act}</span>
                        </div>
                    `).join('')}
                </div>` : ''}

                ${v.phases && v.phases.some(p => p) ? `
                <div style="margin-bottom:8px;">
                    ${v.phases.map((p, i) => p ? `
                        <div style="padding:5px 8px; margin-bottom:4px; border-radius:5px; background:${v.phase === i+1 ? VILLAIN_PHASE_COLORS[i]+'15' : 'rgba(10,8,30,0.5)'}; border:1px solid ${v.phase === i+1 ? VILLAIN_PHASE_COLORS[i]+'50' : 'var(--dimmer)'}; font-size:0.68rem; color:${v.phase === i+1 ? '#fff' : 'var(--dim)'}; font-family:Arial,sans-serif;">
                            <span style="color:${VILLAIN_PHASE_COLORS[i]}; font-weight:bold;">Phase ${i+1}: </span>${p}
                        </div>
                    ` : '').join('')}
                </div>` : ''}
                
                <button class="btn-sm" style="background:rgba(239,83,80,0.15); color:#ef5350; margin-top:4px;" onclick="openVillainEditor(${v.id})">Edit</button>
            </div>`;
        });
    }
    container.innerHTML = html;
}

function adjustVillainHp(id, amount) {
    const v = state.villains.find(x => x.id === id);
    if (v) {
        v.hp = Math.max(0, Math.min(v.maxHp, v.hp + amount));
        saveState();
        renderVillains();
    }
}

function setVillainPhase(id, phase) {
    const v = state.villains.find(x => x.id === id);
    if (v) {
        v.phase = phase;
        saveState();
        renderVillains();
    }
}

function setVillainStatus(id, status) {
    const v = state.villains.find(x => x.id === id);
    if (v) {
        v.status = status;
        saveState();
        renderVillains();
    }
}

function openVillainEditor(id) {
    let v = id === 'new' ? {id: Date.now(), name:"", title:"", arc:"", location:"", maxHp:100, hp:100, phase:1, status:"active", motivation:"", weakness:"", crimes:[], phases:["","","",""]} : state.villains.find(x => x.id === id);
    if (!v.crimes) v.crimes = [];
    if (!v.phases) v.phases = ["","","",""];

    window.tempVillain = JSON.parse(JSON.stringify(v));
    renderVillainModal(id === 'new');
}

function renderVillainModal(isNew) {
    let v = window.tempVillain;
    const existingModal = document.getElementById('villainModal');
    if (existingModal) existingModal.remove();

    const modalHtml = `
        <div id="villainModal" style="position:fixed; inset:0; background:rgba(2,1,15,0.97); z-index:200; overflow-y:auto; padding:16px;">
            <div style="background:rgba(15,8,8,0.99); border:1px solid rgba(239,83,80,0.4); border-radius:12px; padding:18px; max-width:500px; margin:auto; margin-top:20px;">
                <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:16px;">
                    <div style="font-weight:bold; font-size:0.95rem; color:#fff;">${isNew ? '🎭 New Villain' : '🎭 ' + v.name}</div>
                    <button style="background:none; border:none; color:var(--dim); font-size:1.2rem; cursor:pointer;" onclick="document.getElementById('villainModal').remove()">✕</button>
                </div>
                
                <label class="label">Name</label>
                <input class="input" id="editVilName" value="${v.name}" onchange="window.tempVillain.name=this.value" placeholder="Villain name...">
                
                <label class="label">Title / Epithet</label>
                <input class="input" id="editVilTitle" value="${v.title}" onchange="window.tempVillain.title=this.value" placeholder="e.g. The Warden of Ash...">
                
                <label class="label">Arc</label>
                <input class="input" id="editVilArc" value="${v.arc}" onchange="window.tempVillain.arc=this.value" placeholder="Which arc are they active in...">
                
                <label class="label">Location</label>
                <input class="input" id="editVilLoc" value="${v.location}" onchange="window.tempVillain.location=this.value" placeholder="Where are they operating...">
                
                <label class="label">Motivation</label>
                <textarea class="textarea" id="editVilMotiv" onchange="window.tempVillain.motivation=this.value" placeholder="What do they want and why...">${v.motivation}</textarea>
                
                <label class="label">Known Weakness</label>
                <input class="input" id="editVilWeak" value="${v.weakness}" onchange="window.tempVillain.weakness=this.value" placeholder="What can stop them...">
                
                <div style="display:flex; gap:8px; margin-bottom:10px;">
                    <div style="flex:1;">
                        <label class="label">Max HP</label>
                        <input class="input" type="number" id="editVilMaxHp" value="${v.maxHp}" onchange="window.tempVillain.maxHp=parseInt(this.value)||100">
                    </div>
                    <div style="flex:1;">
                        <label class="label">Current HP</label>
                        <input class="input" type="number" id="editVilHp" value="${v.hp}" onchange="window.tempVillain.hp=parseInt(this.value)||0">
                    </div>
                </div>

                <div class="section-title" style="margin-top:8px;">Phase Descriptions</div>
                ${[1,2,3,4].map(p => `
                    <div style="display:flex; gap:6px; align-items:center; margin-bottom:6px;">
                        <span style="font-size:0.65rem; color:${VILLAIN_PHASE_COLORS[p-1]}; min-width:50px; font-family:Arial,sans-serif;">Phase ${p}</span>
                        <input class="input" style="flex:1; margin-bottom:0;" value="${v.phases[p-1] || ''}" onchange="window.tempVillain.phases[${p-1}]=this.value" placeholder="Phase ${p} behaviour...">
                    </div>
                `).join('')}

                <div class="section-title" style="margin-top:12px;">What They’ve Done to Players</div>
                ${v.crimes.map((c, i) => `
                    <div style="display:flex; gap:6px; margin-bottom:6px; align-items:center;">
                        <input class="input" style="flex:0 0 100px; margin-bottom:0;" value="${c.victim}" onchange="window.tempVillain.crimes[${i}].victim=this.value" placeholder="@player">
                        <input class="input" style="flex:1; margin-bottom:0;" value="${c.act}" onchange="window.tempVillain.crimes[${i}].act=this.value" placeholder="What they did...">
                        <button style="background:none; border:none; color:var(--dim); cursor:pointer;" onclick="window.tempVillain.crimes.splice(${i},1); renderVillainModal(${isNew})">✕</button>
                    </div>
                `).join('')}
                <button class="btn-sm" style="background:rgba(239,83,80,0.15); color:#ef5350; margin-bottom:16px; margin-top:6px;" onclick="window.tempVillain.crimes.push({victim:'', act:''}); renderVillainModal(${isNew})">+ Add Crime</button>

                <div style="display:flex; gap:8px; flex-wrap:wrap;">
                    <button class="btn" style="width:auto; flex:1; background:rgba(239,83,80,0.6); color:#fff;" onclick="saveVillain(${isNew})">🎭 Save</button>
                    ${!isNew ? `<button class="btn" style="width:auto; background:rgba(30,25,50,0.8); color:var(--dim);" onclick="deleteVillain(${v.id})">Remove</button>` : ''}
                    <button class="btn" style="width:auto; background:rgba(20,16,50,0.8); color:var(--dim);" onclick="document.getElementById('villainModal').remove()">Cancel</button>
                </div>
            </div>
        </div>
    `;
    document.body.insertAdjacentHTML('beforeend', modalHtml);
}

function saveVillain(isNew) {
    window.tempVillain.name = document.getElementById('editVilName').value;
    window.tempVillain.title = document.getElementById('editVilTitle').value;
    window.tempVillain.arc = document.getElementById('editVilArc').value;
    window.tempVillain.location = document.getElementById('editVilLoc').value;
    window.tempVillain.motivation = document.getElementById('editVilMotiv').value;
    window.tempVillain.weakness = document.getElementById('editVilWeak').value;
    window.tempVillain.maxHp = parseInt(document.getElementById('editVilMaxHp').value) || 100;
    window.tempVillain.hp = parseInt(document.getElementById('editVilHp').value) || 0;

    if (!window.tempVillain.name.trim()) return alert("Name required.");

    if (isNew) {
        state.villains.unshift(window.tempVillain);
    } else {
        const idx = state.villains.findIndex(x => x.id === window.tempVillain.id);
        if (idx !== -1) state.villains[idx] = window.tempVillain;
    }

    saveState();
    document.getElementById('villainModal').remove();
    renderVillains();
}

function deleteVillain(id) {
    if (confirm("Remove villain?")) {
        state.villains = state.villains.filter(x => x.id !== id);
        saveState();
        document.getElementById('villainModal').remove();
        renderVillains();
    }
}

// ═══════════════════════════════════════════════════
// RULES ENGINE
// ═══════════════════════════════════════════════════
function initRules() {
    const select = document.getElementById('rulesSelect');
    select.innerHTML = RULES_SECTIONS.map(r => `<option value="${r.id}">${r.label}</option>`).join('');
    renderRules();
    renderFaq();
}

function renderRules() {
    const sectionId = document.getElementById('rulesSelect').value;
    const rule = RULES_SECTIONS.find(r => r.id === sectionId);
    if (!rule) return;

    let linesHtml = '';
    rule.content.split('\n').forEach(line => {
        if (!line.trim()) {
            linesHtml += `<div style="height:8px;"></div>`;
            return;
        }
        const isBold = ["⚔","💀","☠","⚠","👁","🌑","★","🎬","👑","🌟","⚗","💰","🎲","🤝","🗳","⚡","🛡","🎵","🔮","🗡","💚","🪆","📡","🌍","🏆"].some(e => line.startsWith(e)) || /^[1-5]\./.test(line);
        linesHtml += `<div style="font-size:0.76rem; color:${isBold ? 'var(--text)' : 'var(--dim)'}; line-height:1.6; margin-bottom:2px; font-family:Arial,sans-serif; font-weight:${isBold ? 'bold' : 'normal'};">${line}</div>`;
    });

    document.getElementById('rulesContentDisplay').innerHTML = `
        <div style="font-size:1.4rem; margin-bottom:6px;">${rule.icon}</div>
        <div style="font-weight:bold; font-size:0.9rem; color:var(--purple-light); margin-bottom:12px;">${rule.label.replace(/^.+? /, "")}</div>
        ${linesHtml}
    `;
}

let faqOpenId = null;
function renderFaq() {
    const s = document.getElementById('faqSearch').value.toLowerCase();
    const filtered = FAQ.filter(f => !s || f.q.toLowerCase().includes(s) || f.a.toLowerCase().includes(s));
    
    document.getElementById('faqDisplay').innerHTML = filtered.map((f, i) => `
        <div style="border-bottom:1px solid var(--dimmer); margin-bottom:4px;">
            <button style="background:none; border:none; cursor:pointer; text-align:left; width:100%; padding:10px 0; color:${faqOpenId === i ? 'var(--purple-light)' : 'var(--text)'}; font-size:0.76rem; font-family:Arial,sans-serif; display:flex; justify-content:space-between; align-items:center;" onclick="faqOpenId = ${faqOpenId === i ? null : i}; renderFaq()">
                <span>${f.q}</span><span style="color:var(--dim); font-size:0.7rem; margin-left:8px; flex-shrink:0;">${faqOpenId === i ? '▲' : '▼'}</span>
            </button>
            ${faqOpenId === i ? `<div style="font-size:0.72rem; color:var(--dim); line-height:1.6; padding-bottom:10px; font-family:Arial,sans-serif;">${f.a}</div>` : ''}
        </div>
    `).join('');
}

// ═══════════════════════════════════════════════════
// REFERENCE ENGINE
// ═══════════════════════════════════════════════════
let refClass = "Warrior";

function renderRef() {
    // Nav
    document.getElementById('refClassNav').innerHTML = CLASSES.map(c => `
        <button class="btn-sm" style="background:${refClass === c ? 'var(--purple)' : 'rgba(20,16,50,0.8)'}; color:${refClass === c ? '#fff' : 'var(--dim)'};" onclick="refClass='${c}'; renderRef()">${CLASS_ICON[c]} ${c}</button>
    `).join('');

    // Tables
    let html = `<div style="font-size:0.75rem; font-weight:bold; color:#fff; margin-bottom:10px; font-family:Arial,sans-serif;">Reputation Titles — ${refClass}</div>`;
    
    (REP[refClass] || []).forEach(r => {
        const mid = (r.r[0] + r.r[1]) / 2;
        const col = mid <= 4 ? "#f44336" : mid <= 9 ? "#81c784" : mid <= 14 ? "#64b5f6" : mid <= 19 ? "#ffb300" : "#ce93d8";
        html += `
        <div style="padding:8px 0; border-bottom:1px solid var(--dimmer);">
            <div style="display:flex; gap:8px; align-items:baseline;">
                <span style="color:${col}; font-size:0.7rem; min-width:30px; font-family:Arial,sans-serif;">${r.r[0] === r.r[1] ? r.r[0] : `${r.r[0]}–${r.r[1]}`}</span>
                <span style="color:${col}; font-weight:${mid === 20 ? 'bold' : 'normal'}; font-size:0.78rem;">${r.title}</span>
            </div>
            <div style="color:var(--dim); font-size:0.66rem; margin-top:2px; padding-left:36px; font-family:Arial,sans-serif;">${r.passive}</div>
        </div>`;
    });

    html += `<div style="font-size:0.75rem; font-weight:bold; color:#fff; margin:14px 0 10px; font-family:Arial,sans-serif;">Starting Weapons — ${refClass}</div>`;
    
    (WEAPONS[refClass] || []).forEach(w => {
        const rarColor = AR[w.rarity] ? AR[w.rarity].color : '#aaa';
        html += `
        <div style="padding:7px 0; border-bottom:1px solid var(--dimmer);">
            <div style="display:flex; gap:8px; align-items:baseline;">
                <span style="color:${rarColor}; font-size:0.7rem; min-width:30px; font-family:Arial,sans-serif;">${w.r[0] === w.r[1] ? w.r[0] : `${w.r[0]}–${w.r[1]}`}</span>
                <span style="color:${rarColor}; font-size:0.76rem;">${w.name}</span>
            </div>
            <div style="color:var(--dim); font-size:0.66rem; margin-top:2px; padding-left:36px; font-family:Arial,sans-serif;">${w.special}</div>
        </div>`;
    });
    
    document.getElementById('refTablesDisplay').innerHTML = html;

    // Gifts
    const gifts = [
        ["🌑 Entry","1,000","~$7"], ["⚔ Minor","100","~$0.70"], ["⚔⚔ Moderate","500","~$3.50"], ["⚔⚔⚔ Major","5,000","~$35"], 
        ["⚡ Epic Lion","29,999","~$210"], ["🎬 Episode","5,000+","~$35"], ["👑 Origin Story","10,000","~$70"], ["🌟 Gift a Legend","20,000","~$140"], 
        ["⚗ Resurrection","6,000","~$42"], ["🛡 Protection","1k/session","~$7"], ["🎲 Re-Roll 1st","500","~$3.50"], ["🎲 Re-Roll 2nd","1,500","~$10.50"]
    ];
    document.getElementById('refGiftsDisplay').innerHTML = gifts.map(([tier, coins, you]) => `
        <div style="display:flex; justify-content:space-between; padding:6px 0; border-bottom:1px solid var(--dimmer); font-size:0.7rem; font-family:Arial,sans-serif;">
            <span style="color:#bbb; flex:2;">${tier}</span>
            <span style="color:var(--gold); flex:1; text-align:center;">${coins}</span>
            <span style="color:var(--dim); flex:1; text-align:right;">${you}</span>
        </div>
    `).join('');
}
// ═══════════════════════════════════════════════════
// 6. INITIALIZATION & SYSTEM BOOT
// ═══════════════════════════════════════════════════
window.onload = () => {
    // Boot up the default active tab (Classes)
    renderClasses();
    
    // Pre-render all the other tabs so they load instantly with zero lag
    if (typeof renderArsenal === "function") renderArsenal();
    renderBestiary();
    renderNpcs();
    if (typeof renderVillains === "function") renderVillains();
    initRules();
    if (typeof renderRef === "function") renderRef();
};

</script>
</body>
</html>
