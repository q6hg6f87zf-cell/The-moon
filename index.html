<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Enhanced 3D Particle System</title>
    <style>
        body { margin: 0; overflow: hidden; background-color: #030305; }
        canvas { display: block; }
    </style>
</head>
<body>
    <script type="module">
        import * as THREE from 'https://cdn.skypack.dev/three@0.136.0';
        import { OrbitControls } from 'https://cdn.skypack.dev/three@0.136.0/examples/jsm/controls/OrbitControls.js';
        import { EffectComposer } from 'https://cdn.skypack.dev/three@0.136.0/examples/jsm/postprocessing/EffectComposer.js';
        import { RenderPass } from 'https://cdn.skypack.dev/three@0.136.0/examples/jsm/postprocessing/RenderPass.js';
        import { UnrealBloomPass } from 'https://cdn.skypack.dev/three@0.136.0/examples/jsm/postprocessing/UnrealBloomPass.js';

        // 1. Scene & Camera Setup
        const scene = new THREE.Scene();
        scene.fog = new THREE.FogExp2(0x030305, 0.02);

        const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(0, 5, 20);

        const renderer = new THREE.WebGLRenderer({ antialias: false, powerPreference: "high-performance" });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
        document.body.appendChild(renderer.domElement);

        const controls = new OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;
        controls.dampingFactor = 0.05;
        controls.autoRotate = true;
        controls.autoRotateSpeed = 0.5;

        // 2. Post-Processing (Bloom)
        const renderScene = new RenderPass(scene, camera);
        const bloomPass = new UnrealBloomPass(new THREE.Vector2(window.innerWidth, window.innerHeight), 1.5, 0.4, 0.85);
        bloomPass.threshold = 0.1;
        bloomPass.strength = 1.2; // Intensity of the glow
        bloomPass.radius = 0.5;

        const composer = new EffectComposer(renderer);
        composer.addPass(renderScene);
        composer.addPass(bloomPass);

        // Common Material
        const particleMaterial = new THREE.PointsMaterial({
            size: 0.04,
            vertexColors: true,
            blending: THREE.AdditiveBlending,
            transparent: true,
            opacity: 0.9,
            depthWrite: false
        });

        // 3. Central Core System
        const corePositions = [];
        const coreColors = [];
        const sphereCount = 50000;
        const sphereRadius = 4;

        for (let k = 0; k < sphereCount; k++) {
            const phi = Math.acos(-1 + (2 * k) / sphereCount);
            const theta = Math.sqrt(sphereCount * Math.PI) * phi;
            
            const r = sphereRadius + (Math.random() - 0.5) * 0.2;
            corePositions.push(r * Math.cos(theta) * Math.sin(phi), r * Math.sin(theta) * Math.sin(phi), r * Math.cos(phi));
            
            const color = new THREE.Color().setHSL(0.75 + Math.random() * 0.05, 0.9, 0.5);
            coreColors.push(color.r, color.g, color.b);
        }

        const coreGeo = new THREE.BufferGeometry();
        coreGeo.setAttribute('position', new THREE.Float32BufferAttribute(corePositions, 3));
        coreGeo.setAttribute('color', new THREE.Float32BufferAttribute(coreColors, 3));
        const coreMesh = new THREE.Points(coreGeo, particleMaterial);
        scene.add(coreMesh);

        // 4. Independent Orbital Rings
        const ringMeshes = [];
        const count = 3; 
        const particleCount = 20000; 

        for (let i = 0; i < count; i++) {
            const ringPositions = [];
            const ringColors = [];
            const radius = 6.5 + i * 2.0;
            const thickness = 0.8 + i * 0.3;

            for (let j = 0; j < particleCount; j++) {
                const angle = (j / particleCount) * Math.PI * 2;
                const radiusVariation = radius + (Math.random() - 0.5) * thickness;
                
                const x = Math.cos(angle) * radiusVariation;
                const y = (Math.random() - 0.5) * thickness;
                const z = Math.sin(angle) * radiusVariation;

                ringPositions.push(x, y, z);

                const hue = (i / count) * 0.7 + (j / particleCount) * 0.3;
                const color = new THREE.Color().setHSL(hue, 1, 0.6);
                ringColors.push(color.r, color.g, color.b);
            }

            const ringGeo = new THREE.BufferGeometry();
            ringGeo.setAttribute('position', new THREE.Float32BufferAttribute(ringPositions, 3));
            ringGeo.setAttribute('color', new THREE.Float32BufferAttribute(ringColors, 3));
            
            const ringMesh = new THREE.Points(ringGeo, particleMaterial);
            
            // Random initial tilt for each ring
            ringMesh.rotation.x = Math.random() * Math.PI;
            ringMesh.rotation.y = Math.random() * Math.PI;
            
            // Assign a custom rotation speed for the animation loop
            ringMesh.userData = {
                speedX: (Math.random() - 0.5) * 0.2,
                speedY: (Math.random() - 0.5) * 0.2,
                speedZ: (Math.random() - 0.5) * 0.2
            };

            ringMeshes.push(ringMesh);
            scene.add(ringMesh);
        }

        // 5. Animation Loop
        const clock = new THREE.Clock();

        function animate() {
            requestAnimationFrame(animate);
            const elapsedTime = clock.getElapsedTime();
            
            // Core dynamics: subtle rotation and pulsing scale
            coreMesh.rotation.y = elapsedTime * 0.15;
            coreMesh.rotation.z = elapsedTime * 0.05;
            const scale = 1 + Math.sin(elapsedTime * 2) * 0.02;
            coreMesh.scale.set(scale, scale, scale);

            // Ring dynamics: independent rotation based on assigned speeds
            ringMeshes.forEach(ring => {
                ring.rotation.x += ring.userData.speedX * 0.02;
                ring.rotation.y += ring.userData.speedY * 0.02;
                ring.rotation.z += ring.userData.speedZ * 0.02;
            });
            
            controls.update();
            composer.render(); // Use composer instead of renderer for Bloom
        }

        // Handle Window Resize
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
            composer.setSize(window.innerWidth, window.innerHeight);
        });

        animate();
    </script>
</body>
</html>
