<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<title>The Hollow Realm — GM Suite</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{font-family:'Georgia',serif;background:#050510;color:#e8e0ff;min-height:100vh;overflow-x:hidden}
:root{
  --purple:#8a5adc;--purple-light:#b388ff;--purple-dim:#3d2b6b;
  --gold:#ffd54f;--green:#66bb6a;--red:#ef5350;--blue:#4fc3f7;
  --dim:#7b6fa0;--dimmer:#3d3560;--text:#c8c0e8;
  --card:rgba(20,16,50,0.9);--border:rgba(138,90,220,0.25);
  --border-glow:rgba(138,90,220,0.6);
  --bg:linear-gradient(135deg,#050510 0%,#0a0825 50%,#050510 100%);
}
/* Layout */
#app{max-width:480px;margin:0 auto;min-height:100vh;background:var(--bg)}
.header{background:rgba(10,8,30,0.98);border-bottom:1px solid var(--border);padding:12px 16px;position:sticky;top:0;z-index:50}
.header-title{font-weight:bold;font-size:0.9rem;color:#fff;letter-spacing:2px}
.header-title span{color:var(--purple-light)}
.header-sub{font-size:0.55rem;color:var(--dim);letter-spacing:1px;font-family:Arial,sans-serif}
.header-badge{background:linear-gradient(135deg,var(--purple),#3f51b5);color:#fff;font-size:0.58rem;font-weight:bold;padding:3px 10px;border-radius:20px;letter-spacing:1px;box-shadow:0 0 12px rgba(138,90,220,0.4)}
/* Tab bar */
.tabs{display:flex;overflow-x:auto;gap:0;background:rgba(5,4,18,0.98);border-bottom:1px solid var(--border);scrollbar-width:none;-webkit-overflow-scrolling:touch}
.tabs::-webkit-scrollbar{display:none}
.tab{padding:10px 12px;font-size:0.65rem;color:var(--dim);cursor:pointer;white-space:nowrap;border-bottom:2px solid transparent;transition:all 0.15s;font-family:Arial,sans-serif;flex-shrink:0}
.tab.active{color:var(--purple-light);border-bottom-color:var(--purple)}
/* Panel */
.panel{padding:12px 12px 80px}
/* Cards */
.card{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:12px;margin-bottom:10px}
.card-glow{background:linear-gradient(135deg,rgba(30,20,60,0.95),rgba(10,8,30,0.98));border:1px solid var(--border-glow);border-radius:12px;padding:16px;margin-bottom:12px;box-shadow:0 0 30px rgba(138,90,220,0.15)}
.section-title{font-size:0.65rem;text-transform:uppercase;letter-spacing:2px;color:var(--purple-light);margin-bottom:10px;font-family:Arial,sans-serif}
/* Buttons */
.btn{display:inline-flex;align-items:center;justify-content:center;padding:9px 16px;border-radius:8px;border:none;cursor:pointer;font-family:Arial,sans-serif;font-size:0.75rem;font-weight:bold;transition:all 0.15s;gap:5px}
.btn-purple{background:linear-gradient(135deg,var(--purple),#3f51b5);color:#fff;box-shadow:0 0 15px rgba(138,90,220,0.3)}
.btn-sm{padding:5px 10px;font-size:0.65rem;border-radius:6px;border:1px solid var(--border);background:rgba(138,90,220,0.15);color:var(--purple-light);cursor:pointer;font-family:Arial,sans-serif}
.btn-red{background:rgba(80,10,10,0.9);color:var(--red);border:1px solid rgba(239,83,80,0.3)}
.btn-green{background:rgba(10,50,20,0.9);color:var(--green);border:1px solid rgba(102,187,106,0.3)}
.btn-full{width:100%;display:block;text-align:center}
/* Inputs */
.input{background:rgba(10,8,30,0.9);border:1px solid var(--border);border-radius:6px;padding:8px 10px;color:#fff;font-size:0.78rem;font-family:Arial,sans-serif;width:100%;outline:none}
.input:focus{border-color:var(--purple)}
.select{background:rgba(10,8,30,0.9);border:1px solid var(--border);border-radius:6px;padding:8px 10px;color:#fff;font-size:0.75rem;font-family:Arial,sans-serif;width:100%;outline:none;-webkit-appearance:none}
.textarea{background:rgba(10,8,30,0.9);border:1px solid var(--border);border-radius:6px;padding:8px 10px;color:#fff;font-size:0.75rem;font-family:Arial,sans-serif;width:100%;outline:none;resize:vertical;min-height:70px}
.label{display:block;font-size:0.6rem;color:var(--dim);text-transform:uppercase;letter-spacing:1.5px;margin-bottom:4px;font-family:Arial,sans-serif}
/* Tags */
.tag{display:inline-block;padding:2px 7px;border-radius:8px;font-size:0.58rem;font-family:Arial,sans-serif;margin:1px}
/* HP bar */
.hp-bar-wrap{height:6px;background:rgba(255,255,255,0.06);border-radius:3px;overflow:hidden;margin-top:3px}
.hp-bar{height:100%;border-radius:3px;transition:width 0.3s}
/* Stat bars */
.stat-grid{display:grid;grid-template-columns:1fr 1fr;gap:6px 12px;margin-top:8px}
.stat-row{}
.stat-label{display:flex;justify-content:space-between;font-size:0.58rem;font-family:Arial,sans-serif;margin-bottom:2px}
.stat-bar-wrap{height:3px;background:rgba(255,255,255,0.05);border-radius:2px;overflow:hidden}
.stat-bar{height:100%;border-radius:2px}
/* Modal */
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(2,1,15,0.97);z-index:200;overflow-y:auto;padding:16px}
.modal-overlay.active{display:block}
.modal-box{background:rgba(15,12,40,0.99);border:1px solid var(--border-glow);border-radius:12px;padding:18px;max-width:480px;margin:0 auto;box-shadow:0 0 40px rgba(138,90,220,0.2)}
/* Player card */
.player-card{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:12px;margin-bottom:10px;transition:border-color 0.2s}
.player-card.protected{border-color:rgba(255,213,79,0.4)}
.player-card.dead{opacity:0.6;border-color:rgba(239,83,80,0.3)}
/* Consequence pills */
.pill-curse{background:rgba(50,10,60,0.8);color:#e1bee7}
.pill-wanted{background:rgba(60,10,10,0.8);color:#ffcdd2}
.pill-exile{background:rgba(20,20,30,0.8);color:#bbb}
.pill-servant{background:rgba(5,30,25,0.8);color:#b2dfdb}
/* Dice */
.dice-svg{display:block;margin:0 auto}
/* Battle */
.consequence-row{display:flex;align-items:center;gap:10px;padding:7px 0;border-bottom:1px solid rgba(255,255,255,0.04)}
/* Map SVG */
#map-svg{width:100%;cursor:pointer}
/* Roll box */
.roll-box{background:rgba(8,6,25,0.9);border:1px solid var(--border);border-radius:8px;padding:14px;margin-top:8px}
/* Divider */
.divider{height:1px;background:linear-gradient(90deg,transparent,var(--border),transparent);margin:12px 0}
/* Active session indicator */
.session-live{display:inline-block;width:7px;height:7px;border-radius:50%;background:#66bb6a;box-shadow:0 0 6px #66bb6a;animation:pulse 1.5s ease-in-out infinite;margin-right:5px}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:0.4}}
/* Raid phase bar */
.phase-bar{display:flex;gap:3px}
.phase-pip{flex:1;height:5px;border-radius:3px;transition:all 0.2s}
/* Spin animation for dice */
@keyframes spin{0%{transform:rotate(0deg)}100%{transform:rotate(360deg)}}
.spinning{animation:spin 0.15s linear infinite;transform-origin:center}
/* Fade in */
@keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.fade-in{animation:fadeIn 0.25s ease forwards}
/* Search */
.search-wrap{position:relative;margin-bottom:10px}
.search-wrap input{padding-left:30px}
.search-icon{position:absolute;left:10px;top:50%;transform:translateY(-50%);color:var(--dim);font-size:0.8rem;pointer-events:none}
/* Empty state */
.empty-state{text-align:center;color:var(--dimmer);padding:50px 16px;font-size:0.82rem}
.empty-icon{font-size:2.5rem;margin-bottom:10px}
/* Tooltip-style info bar */
.info-bar{background:rgba(138,90,220,0.08);border:1px solid var(--border);border-radius:6px;padding:8px 12px;font-size:0.68rem;color:var(--dim);font-family:Arial,sans-serif;margin-bottom:10px;line-height:1.5}
/* Classes lore */
.lore-tab-bar{display:flex;gap:4px;flex-wrap:wrap;margin-bottom:12px}
.lore-tab{padding:5px 10px;border-radius:14px;font-size:0.62rem;font-family:Arial,sans-serif;cursor:pointer;border:1px solid var(--border);background:transparent;color:var(--dim);transition:all 0.15s}
.lore-tab.active{background:rgba(138,90,220,0.2);color:var(--purple-light);border-color:var(--purple)}
/* Villain phases */
.phase-card{border-radius:8px;padding:12px;margin-bottom:8px}
/* Base rooms */
.room-card{display:flex;justify-content:space-between;align-items:flex-start;padding:10px 0;border-bottom:1px solid rgba(255,255,255,0.04)}
/* Inventory */
.item-card{background:rgba(8,6,25,0.8);border-radius:6px;padding:8px 10px;margin-bottom:6px}
/* Log feed */
.log-entry{display:flex;gap:10px;padding:7px 0;border-bottom:1px solid rgba(255,255,255,0.03)}
.log-time{flex-shrink:0;width:52px;text-align:right;font-size:0.58rem;color:var(--dim);font-family:Arial,sans-serif;padding-top:1px}
.log-icon{flex-shrink:0;width:20px;text-align:center;font-size:0.8rem}
.log-body{flex:1}
.log-who{font-size:0.7rem;font-weight:bold;font-family:Arial,sans-serif}
.log-what{font-size:0.72rem;color:var(--text);font-family:Arial,sans-serif;margin-top:1px}
/* Responsive overflow */
.overflow-x{overflow-x:auto;scrollbar-width:none;-webkit-overflow-scrolling:touch}
.overflow-x::-webkit-scrollbar{display:none}

</style>
</head>

{r:[10,12],thread:“Something you know will save a life and end another. You will not know which is which until it is done.”},
{r:[13,15],thread:“The Hollow has a question for you. You will not recognise it as a question when it is asked.”},
{r:[16,18],thread:“You will be offered everything you have ever wanted. The offering is the test. What you do with the test is the point.”},
{r:[19,19],thread:“You are not researching the Hollow. The Hollow is researching you.”},
{r:[20,20],thread:“UNIQUE. You already know how this ends. You have not admitted it to yourself yet.”}
],
Rogue:[
{r:[1,3],thread:“The person you are running from is not who you think they are. Neither are you.”},
{r:[4,6],thread:“You will steal something that cannot be unfound. The finder will use it. The use will matter.”},
{r:[7,9],thread:“Someone is using you without your knowledge. When you find out, you will have to decide if it matters.”},
{r:[10,12],thread:“The one job you refuse to take will find you anyway.”},
{r:[13,15],thread:“You will be in the right place at the wrong time or the wrong place at the right time. The Hollow has not decided which.”},
{r:[16,18],thread:“Your real name will surface. What people do with it determines what you do next.”},
{r:[19,19],thread:“You have already changed something permanently. You do not know what it was.”},
{r:[20,20],thread:“UNIQUE. The Hollow has been following your work. It has an offer. The offer is not what you would expect.”}
],
Healer:[
{r:[1,3],thread:“You will save someone who should not have survived. What they do with that survival is on you.”},
{r:[4,6],thread:“The one you could not save will become relevant again. How is not something you can prepare for.”},
{r:[7,9],thread:“You will be asked to choose between two lives. The Hollow will not tell you which choice is correct.”},
{r:[10,12],thread:“Your healing will be used for something you would not have chosen. You will find out after.”},
{r:[13,15],thread:“Something is using your compassion against you. You will have to decide if you care.”},
{r:[16,18],thread:“You will face a death you cannot prevent. What you do in the aftermath is the destiny, not the death.”},
{r:[19,19],thread:“The Hollow wants something healed that it will not name. You will know it when you see it.”},
{r:[20,20],thread:“UNIQUE. You are not here by accident. The Hollow placed you here specifically for one moment that has not happened yet.”}
],
Merchant:[
{r:[1,3],thread:“The deal that defines you is coming. You will not recognise it as the defining one until it is done.”},
{r:[4,6],thread:“You will possess something priceless. The price will be extracted whether you sell it or not.”},
{r:[7,9],thread:“The network you have built will be used against you by someone inside it.”},
{r:[10,12],thread:“You will be offered a transaction that is genuinely fair. It will be the most dangerous thing anyone has ever offered you.”},
{r:[13,15],thread:“Something in the Hollow economy responds to you specifically. You do not yet know if that is good.”},
{r:[16,18],thread:“The currency you are actually trading in is not coin. The Hollow is about to show you what it is.”},
{r:[19,19],thread:“You will make a deal with something that does not deal in conventional terms. You will not know until after.”},
{r:[20,20],thread:“UNIQUE. The Hollow considers you its merchant. This means something specific that you have not been told.”}
],
Bard:[
{r:[1,3],thread:“The song that defines the Hollow Realm is not yet written. The Hollow is waiting to see if you are the one who writes it.”},
{r:[4,6],thread:“You will tell a story that becomes true. You will not know it was a prophecy when you were telling it.”},
{r:[7,9],thread:“Your most important audience has not heard you yet. When they do, something permanent happens.”},
{r:[10,12],thread:“The story you are afraid to tell is the one that matters most.”},
{r:[13,15],thread:“You will witness the defining moment of this arc. What you do with the witness is what the Hollow is interested in.”},
{r:[16,18],thread:“Something in the Hollow remembers an older version of a song you know. It wants to hear it again.”},
{r:[19,19],thread:“The Hollow is listening to everything you perform. It is building something with what it hears.”},
{r:[20,20],thread:“UNIQUE. You are the narrator of this story. You have not realised this means you can change how it ends.”}
]

{id:“overview”,title:“How The Hollow Realm Works”,content:`The Hollow Realm is a live TikTok RPG. Viewers become characters. Gifts drive the story. The d20 decides everything.

// Helper functions
function getRep(cls, roll) { return (REP[cls]||[]).find(r => roll >= r.r[0] && roll <= r.r[1]); }
function getWeapon(cls, roll) { return (WEAPONS[cls]||[]).find(r => roll >= r.r[0] && roll <= r.r[1]); }
function getTrait(roll) { return TRAIT_TIERS.find(t => roll >= t.range[0] && roll <= t.range[1]); }
function getSkill(cls, roll) { return (SIGNATURE_SKILLS[cls]||[]).find(r => roll >= r.r[0] && roll <= r.r[1]); }
function getShadow(cls, roll) { return (SHADOW_TRAITS[cls]||[]).find(r => roll >= r.r[0] && roll <= r.r[1]); }
function getEnchant(cls, roll) { return (ENCHANTMENTS[cls]||[]).find(r => roll >= r.r[0] && roll <= r.r[1]); }
function getDestiny(cls, roll) { return (DESTINY_THREADS[cls]||[]).find(r => roll >= r.r[0] && roll <= r.r[1]); }
function d20() { return Math.floor(Math.random() * 20) + 1; }
function getDiceDisplay(r) {
if (!r) return null;
if (r === 1) return {label:“💀 FUMBLE”,desc:“Catastrophic backfire.”,bg:”#b71c1c”,glow:”#ef5350”};
if (r <= 4) return {label:“✗ FAIL”,desc:“Action fails entirely.”,bg:”#c62828”,glow:”#ef5350”};
if (r <= 9) return {label:“⚠ WEAK HIT”,desc:“Partial — something goes wrong.”,bg:“rgba(100,40,5,0.95)”,glow:”#ff9800”};
if (r <= 14) return {label:“✓ SUCCESS”,desc:“Clean success.”,bg:“rgba(10,50,20,0.95)”,glow:”#4caf50”};
if (r <= 19) return {label:“★ STRONG HIT”,desc:“Success + bonus effect.”,bg:“rgba(5,30,80,0.95)”,glow:”#4fc3f7”};
return {label:“⚡ CRITICAL!”,desc:“LEGENDARY. ANNOUNCE IT.”,bg:“rgba(60,10,100,0.95)”,glow:”#ce93d8”};
}
function getPlayerStats(p) {
const base = CLASS_BASE_STATS[p.cls] || {STR:5,DEF:5,INT:5,WIS:5,SPD:5,CHA:5,LCK:5};
const trait = TRAIT_TIERS.find(t => t.level === p.traitLevel);
const bonus = trait ? trait.bonus : 0;
const primary = PRIMARY_STAT[p.cls] || “STR”;
return Object.fromEntries(Object.entries(base).map(([k,v]) => [k, k === primary ? v + bonus : v]));
}
function rangeLabel(r) { return r[0] === r[1] ? String(r[0]) : r[0]+’-’+r[1]; }

function addLog(entry) {
if (!STATE.sessionActive) return;
const now = new Date();
const e = {
id: Date.now() + Math.random(),
time: now.toLocaleTimeString([],{hour:‘2-digit’,minute:‘2-digit’,second:‘2-digit’}),
session: STATE.sessionNumber,
…entry
};
STATE.sessionLog.push(e);
save(‘session_log’, STATE.sessionLog);
}

function updatePlayer(id, updates) {
const idx = STATE.players.findIndex(p => p.id === id);
if (idx > -1) {
STATE.players[idx] = {…STATE.players[idx], …updates};
save(‘players’, STATE.players);
}
}

function adjHP(id, delta) {
const p = STATE.players.find(x => x.id === id);
if (!p) return;
const nh = Math.max(0, Math.min(p.maxHp, p.hp + delta));
updatePlayer(id, {hp: nh});
addLog({type:‘hp’, who:p.charname, what:`HP ${delta>0?'+':''}${delta} → ${nh}/${p.maxHp}`});
if (nh === 0) addLog({type:‘death’, who:p.charname, what:`${p.charname} DOWNED at 0 HP`});
}

function esc(s){if(s==null)return’’;return String(s).replace(/&/g,’&’).replace(/</g,’<’).replace(/>/g,’>’).replace(/”/g,’"’).replace(/’/g,’'’);}

function hpColor(pct){return pct>60?‘var(–green)’:pct>30?’#ff9800’:‘var(–red)’;}

function statBars(p){
const stats=getPlayerStats(p);
return ‘<div class="stat-grid">’+Object.entries(stats).map(([s,v])=>{
const c=STAT_COLORS[s];const pct=Math.min(100,(v/12)*100);
return`<div><div class="stat-label"><span style="color:${c};font-weight:bold">${s}</span><span style="color:${c}">${v}</span></div><div class="stat-bar-wrap"><div class="stat-bar" style="width:${pct}%;background:${c};box-shadow:0 0 4px ${c}80"></div></div></div>`;
}).join(’’)+’</div>’;
}

// PLAYERS TAB
function renderPlayers(){
const live=STATE.players.filter(p=>!p.isDead&&(p.charname||’’).toLowerCase().includes((STATE.search||’’).toLowerCase()));
const dead=STATE.players.filter(p=>p.isDead&&(p.charname||’’).toLowerCase().includes((STATE.search||’’).toLowerCase()));
return`<div style="display:flex;gap:8px;margin-bottom:12px"> <div style="position:relative;flex:1"><span style="position:absolute;left:10px;top:50%;transform:translateY(-50%);color:var(--dim)">🔍</span> <input class="input" style="padding-left:30px" placeholder="Search players..." value="${esc(STATE.search||'')}" oninput="STATE.search=this.value;render()"></div> <button class="btn btn-purple" onclick="STATE.tab='create';render()">+ New</button></div> ${live.length+dead.length===0?`<div class="empty-state"><div class="empty-icon">🌑</div><div>The Hollow awaits its first adventurers.</div></div>`:''} ${live.map(p=>playerCard(p)).join('')} ${dead.length?`<div class="section-title" style="margin-top:16px">☠ Fallen</div>${dead.map(p=>playerCard(p)).join(’’)}`:''}`;
}

function renderCreationRolls(c){
const rolls=[
{key:‘repRoll’,label:‘Roll 1 — Reputation Title’,fn:r=>getRep(c.cls,r),nameKey:‘title’,descKey:‘passive’,col:’#ffb300’,
opts:(REP[c.cls]||[]).map(r=>`<option value="${r.r[0]}">${rangeLabel(r.r)} — ${r.title}</option>`).join(’’)},
{key:‘traitRoll’,label:‘Roll 2 — Trait Effectiveness’,fn:r=>getTrait(r),nameKey:‘level’,descKey:null,col:’#ce93d8’,
opts:TRAIT_TIERS.map((t,i)=>{const rr=[[1,4],[5,9],[10,14],[15,19],[20,20]][i];return`<option value="${rr[0]}">${rangeLabel(rr)} — ${t.level}</option>`;}).join(’’)},
{key:‘weaponRoll’,label:‘Roll 3 — Starting Weapon’,fn:r=>getWeapon(c.cls,r),nameKey:‘name’,descKey:‘special’,
col:r=>{const w=getWeapon(c.cls,r);return RARITY_COLOR[w?.rarity]||’#bbb’;},
opts:(WEAPONS[c.cls]||[]).map(w=>`<option value="${w.r[0]}">${rangeLabel(w.r)} — ${w.name} [${w.rarity}]</option>`).join(’’)},
{key:‘skillRoll’,label:‘Roll 4 — Signature Skill’,fn:r=>getSkill(c.cls,r),nameKey:‘name’,descKey:‘desc’,col:’#4fc3f7’,
opts:(SIGNATURE_SKILLS[c.cls]||[]).map(s=>`<option value="${s.r[0]}">${rangeLabel(s.r)} — ${s.name}</option>`).join(’’)},
{key:‘shadowRoll’,label:‘Roll 5 — Shadow Trait’,fn:r=>getShadow(c.cls,r),nameKey:‘name’,descKey:‘desc’,col:’#ef5350’,
opts:(SHADOW_TRAITS[c.cls]||[]).map(s=>`<option value="${s.r[0]}">${rangeLabel(s.r)} — ${s.name}</option>`).join(’’)},
{key:‘enchantRoll’,label:‘Roll 6 — Enchantment’,fn:r=>getEnchant(c.cls,r),nameKey:‘name’,descKey:‘desc’,col:’#ffd54f’,
opts:(ENCHANTMENTS[c.cls]||[]).map(e=>`<option value="${e.r[0]}">${rangeLabel(e.r)} — ${e.name}</option>`).join(’’)},
{key:‘destinyRoll’,label:‘Roll 7 — Destiny Thread’,fn:r=>getDestiny(c.cls,r),nameKey:‘thread’,descKey:null,col:’#ce93d8’,
opts:(DESTINY_THREADS[c.cls]||[]).map(d=>`<option value="${d.r[0]}">${rangeLabel(d.r)} — ${d.thread.slice(0,50)}...</option>`).join(’’)},
];
return rolls.map(({key,label,fn,nameKey,descKey,col,opts})=>{
const roll=c[key];const result=roll?fn(roll):null;
const color=typeof col===‘function’?(roll?col(roll):’#bbb’):col;
return`<div style="margin-bottom:14px;padding-bottom:14px;border-bottom:1px solid rgba(255,255,255,0.04)"> <div style="font-size:0.66rem;color:var(--dim);margin-bottom:6px;font-family:Arial,sans-serif;font-weight:bold">${label}</div> <div style="display:flex;gap:6px;align-items:center;margin-bottom:6px;flex-wrap:wrap"> <button class="btn btn-sm" style="flex-shrink:0" onclick="STATE.creation['${key}']=d20();render()">🎲 Roll</button> <input type="number" min="1" max="20" class="input" style="width:56px;flex-shrink:0" value="${roll||''}" oninput="STATE.creation['${key}']=parseInt(this.value)||null;render()" placeholder="1-20"> <select class="select" style="flex:1;font-size:0.65rem" onchange="STATE.creation['${key}']=parseInt(this.value)||null;render()"> <option value="">— or pick —</option>${opts} </select> </div> ${result?`<div style="background:rgba(10,8,30,0.9);border:1px solid ${color}40;border-radius:6px;padding:8px 12px">
<div style="color:${color};font-weight:bold;font-size:0.76rem;margin-bottom:3px">${esc(result[nameKey]||’’)}</div>
${descKey&&result[descKey]?`<div style="font-size:0.66rem;color:#888;font-family:Arial,sans-serif">${esc(result[descKey])}</div>`:’’}
${nameKey===‘thread’?`<div style="font-size:0.68rem;color:#888;font-style:italic;font-family:Arial,sans-serif">${esc(result.thread||'')}</div>`:’’}
</div>`:''} </div>`;
}).join(’’)+creationPreview(c);
}

function creationPreview(c){
if(!c.repRoll&&!c.weaponRoll)return’’;
const rep=c.repRoll?getRep(c.cls,c.repRoll):null;
const wpn=c.weaponRoll?getWeapon(c.cls,c.weaponRoll):null;
const skl=c.skillRoll?getSkill(c.cls,c.skillRoll):null;
const shd=c.shadowRoll?getShadow(c.cls,c.shadowRoll):null;
const dest=c.destinyRoll?getDestiny(c.cls,c.destinyRoll):null;
return`<div style="background:rgba(138,90,220,0.05);border:1px solid var(--border);border-radius:8px;padding:12px;margin-top:8px"> <div style="font-size:0.58rem;color:var(--purple-light);text-transform:uppercase;letter-spacing:2px;margin-bottom:8px;font-family:Arial,sans-serif">Character Preview</div> <div style="font-weight:bold;font-size:0.8rem;color:#fff;margin-bottom:4px">${esc(c.charname||'—')} · ${CLASS_ICON[c.cls]||''} ${c.cls}</div> ${rep?`<div style="font-size:0.66rem;color:var(--gold);font-style:italic;margin-bottom:2px">✦ ${esc(rep.title)}</div>`:''} ${wpn?`<div style="font-size:0.66rem;color:${RARITY_COLOR[wpn.rarity]||'#bbb'};margin-bottom:2px">⚔️ ${esc(wpn.name)}</div>`:''} ${skl?`<div style="font-size:0.66rem;color:var(--blue);margin-bottom:2px">⚡ ${esc(skl.name)}</div>`:''} ${shd?`<div style="font-size:0.66rem;color:var(--red);margin-bottom:2px">🌑 ${esc(shd.name)}</div>`:''} ${dest?`<div style="font-size:0.65rem;color:#ce93d8;font-style:italic">🔮 “${esc(dest.thread.slice(0,80))}…”</div>`:’’}

  </div>`;
}

// BATTLE TAB
function renderBattle(){
const mins=Math.floor(STATE.battleTime/60);const secs=(STATE.battleTime%60).toString().padStart(2,‘0’);
const pct=(STATE.battleTime/180)*100;
const TIERS=[{min:0,max:4999,tier:‘⚠ MINOR’,cons:‘Lose title OR stat debuff’,color:’#4caf50’},{min:5000,max:9999,tier:‘⚔ MODERATE’,cons:‘Cursed 2 sessions OR item stolen’,color:’#ff9800’},{min:10000,max:19999,tier:‘💀 MAJOR’,cons:‘Exile OR servant’,color:’#ef5350’},{min:20000,max:44999,tier:‘☠ SEVERE’,cons:‘Killed OR curse+exile+theft’,color:’#b71c1c’},{min:45000,max:Infinity,tier:‘👁 OP CONTROL’,cons:‘Winner narrates anything — one session’,color:’#ce93d8’}];

<div style="font-weight:bold;color:${tier.color};font-size:1rem;margin-bottom:4px">${tier.tier}</div>
<div style="font-size:0.74rem;color:#ccc;font-family:Arial,sans-serif">${tier.cons}</div>
${c1!==c2?`<div style="font-size:0.7rem;color:var(--gold);margin-top:4px;font-family:Arial,sans-serif">Winner: ${esc(c1>c2?STATE.battleP1||'P1':STATE.battleP2||'P2')} · Gap: ${diff.toLocaleString()} coins</div>`:’’}
</div>`:’’}

  </div>
  <div class="card"><div class="section-title">Consequence Ladder</div>
    ${TIERS.map(t=>`<div style="display:flex;align-items:center;gap:10px;padding:7px 0;border-bottom:1px solid rgba(255,255,255,0.04)">
      <div style="min-width:12px;height:12px;border-radius:50%;background:${t.color};box-shadow:0 0 5px ${t.color};flex-shrink:0"></div>
      <div style="flex:1"><div style="font-weight:bold;font-size:0.74rem;color:${t.color}">${t.tier}</div><div style="font-size:0.63rem;color:var(--dim);font-family:Arial,sans-serif">${t.cons}</div></div>
      <div style="font-size:0.6rem;color:var(--dimmer);font-family:Arial,sans-serif">${t.max===Infinity?'45k+':t.min.toLocaleString()+'–'+t.max.toLocaleString()}</div>
    </div>`).join('')}
  </div>`;
}

<div style="font-size:0.6rem;color:var(--dim);text-transform:uppercase;letter-spacing:1.5px;margin-bottom:8px;font-family:Arial,sans-serif">Quick Log</div>

${Object.entries(LOG_TYPES).map(([k,t])=>`<button class="btn btn-sm" style="font-size:0.6rem;background:rgba(10,8,30,0.8);color:${t.color};border:1px solid ${t.color}30" onclick="STATE.manualEntry={who:'',what:'',type:'${k}'};render()">${t.icon} ${t.label}</button>`).join(’’)}
</div>`:’’}

  ${STATE.manualEntry.type&&STATE.sessionActive?`<div class="card" style="border-color:${LOG_TYPES[STATE.manualEntry.type]?.color}40">

      <div style="font-size:0.7rem;color:${LOG_TYPES[STATE.manualEntry.type]?.color};font-weight:bold;font-family:Arial,sans-serif">${LOG_TYPES[STATE.manualEntry.type]?.icon} Log ${LOG_TYPES[STATE.manualEntry.type]?.label}</div>

        <datalist id="whl"><option value="DM">${STATE.players.filter(p=>!p.isDead).map(p=>`<option>${esc(p.charname)}</option>`).join('')}</datalist>
      </div>

        <input class="input" id="log-what" value="${esc(STATE.manualEntry.what)}" oninput="STATE.manualEntry.what=this.value" placeholder="Describe..." onkeydown="if(event.key==='Enter')submitLogEntry()">
      </div>
    </div>
    <button class="btn btn-purple" onclick="submitLogEntry()">+ Add to Log</button>
  </div>`:''}

      ${Object.entries(LOG_TYPES).map(([k,t])=>{const cnt=STATE.sessionLog.filter(e=>e.type===k).length;if(!cnt)return'';return`<button class="btn btn-sm" style="flex-shrink:0;${STATE.logFilter===k?'background:rgba(10,8,30,0.9);color:'+t.color+';border-color:'+t.color:''}" onclick="STATE.logFilter='${k}';render()">${t.icon} ${cnt}</button>`;}).join('')}

  </div>`:`<div class="empty-state"><div class="empty-icon">⏱</div><div>No session started yet.</div></div>`}`;
}

function addPlayer() {
const c = STATE.creation;
if (!c.username || !c.charname || !c.cls) return alert(‘Username, name and class required.’);
const hp = CLASS_HP[c.cls] || 8;
const rep = c.repRoll ? getRep(c.cls, c.repRoll) : null;
const wpn = c.weaponRoll ? getWeapon(c.cls, c.weaponRoll) : null;
const trait = c.traitRoll ? getTrait(c.traitRoll) : null;
const skill = c.skillRoll ? getSkill(c.cls, c.skillRoll) : null;
const shadow = c.shadowRoll ? getShadow(c.cls, c.shadowRoll) : null;
const enchant = c.enchantRoll ? getEnchant(c.cls, c.enchantRoll) : null;
const destiny = c.destinyRoll ? getDestiny(c.cls, c.destinyRoll) : null;
const player = {
id: Date.now(),
username: c.username, charname: c.charname, cls: c.cls,
origin: c.origin, payment: c.payment, notes: c.notes,
hp, maxHp: hp,
position: ‘Starting Position’,
title: rep?.title || ‘’,
repPassive: rep?.passive || ‘’,
traitLevel: trait?.level || ‘’,
inventory: wpn ? [wpn.name + (wpn.special !== ‘None.’ ? ’ (’ + wpn.special + ‘)’ : ‘’)] : [],
signatureSkill: skill?.name || ‘’,
signatureSkillDesc: skill?.desc || ‘’,
shadowTrait: shadow?.name || ‘’,
shadowTraitDesc: shadow?.desc || ‘’,
enchantment: enchant?.name || ‘’,
enchantmentDesc: enchant?.desc || ‘’,
destinyThread: destiny?.thread || ‘’,
consequences: [],
protectionBalance: 0,
isDead: false,
giftPowerUsed: false,
joined: new Date().toLocaleDateString()
};
STATE.players.push(player);
save(‘players’, STATE.players);
STATE.creation = {username:’’,charname:’’,cls:’’,origin:’’,payment:‘tiktok’,notes:’’,
repRoll:null,traitRoll:null,weaponRoll:null,skillRoll:null,shadowRoll:null,enchantRoll:null,destinyRoll:null};
addLog({type:‘action’, who:‘DM’, what:`${player.charname} (${player.cls}) joined The Hollow Realm`});
STATE.tab = ‘players’;
render();
}

function rmInvItem(playerId, idx) {
const p = STATE.players.find(x => x.id === playerId);
if (p) { p.inventory.splice(idx, 1); save(‘players’, STATE.players); render(); }
}

function addInvItem(playerId) {
const el = document.getElementById(‘inv-add-’ + playerId);
if (!el || !el.value.trim()) return;
const p = STATE.players.find(x => x.id === playerId);
if (p) { p.inventory.push(el.value.trim()); save(‘players’, STATE.players); el.value = ‘’; render(); }
}

function addConsequence(playerId, type, label) {
const p = STATE.players.find(x => x.id === playerId);
if (p) {
if (!p.consequences) p.consequences = [];
p.consequences.push({type, label});
save(‘players’, STATE.players);
render();
}
}

function rmConsequence(playerId, idx) {
const p = STATE.players.find(x => x.id === playerId);
if (p) { p.consequences.splice(idx, 1); save(‘players’, STATE.players); render(); }
}

function markDead(id) {
if (!confirm(‘Mark this character as dead?’)) return;
updatePlayer(id, {isDead: true, hp: 0});
const p = STATE.players.find(x => x.id === id);
if (p) addLog({type:‘death’, who:p.charname, what:`${p.charname} has died.`});
STATE.selectedPlayer = null;
render();
}

function resurrect(id) {
const p = STATE.players.find(x => x.id === id);
if (!p) return;
updatePlayer(id, {isDead: false, hp: Math.ceil(p.maxHp / 2)});
addLog({type:‘action’, who:p.charname, what:`${p.charname} resurrected at ${Math.ceil(p.maxHp/2)} HP`});
STATE.selectedPlayer = null;
render();
}

function rollDice() {
if (STATE.diceSpinning) return;
STATE.diceSpinning = true;
STATE.diceRoll = null;
render();
setTimeout(() => {
const result = d20();
STATE.diceRoll = result;
STATE.diceSpinning = false;
const dc = STATE.diceContext;
const cat = dc.purpose ? ROLL_PURPOSES[dc.purpose] : null;
const purpose = dc.custom || (dc.target && dc.target !== ‘custom’ ? dc.target : ‘’) || cat?.label || ‘General roll’;
const who = dc.player || ‘DM’;
const display = getDiceDisplay(result);
STATE.diceHistory.unshift({id:Date.now(), result, label:display?.label||’’, player:who, purpose, time:new Date().toLocaleTimeString([],{hour:‘2-digit’,minute:‘2-digit’,second:‘2-digit’})});
if (STATE.diceHistory.length > 30) STATE.diceHistory.pop();
addLog({type:‘dice’, who, what:purpose, result, label:display?.label||’’});
render();
}, 1400);
}

function toggleBattle() {
STATE.battleRunning = !STATE.battleRunning;
if (STATE.battleRunning) {
STATE.battleInterval = setInterval(() => {
STATE.battleTime–;
if (STATE.battleTime <= 0) { STATE.battleTime = 0; STATE.battleRunning = false; clearInterval(STATE.battleInterval); }
render();
}, 1000);
} else {
clearInterval(STATE.battleInterval);
}
render();
}

function resetBattle() {
clearInterval(STATE.battleInterval);
STATE.battleTime = 180;
STATE.battleRunning = false;
render();
}

function beginSession() {
STATE.sessionActive = true;
STATE.sessionStartTime = Date.now();
save(‘session_active’, true);
save(‘session_start_time’, STATE.sessionStartTime);
addLog({type:‘session’, who:‘DM’, what:`Session ${STATE.sessionNumber} began`});
render();
}

function endSession() {
const duration = STATE.sessionStartTime ? Math.floor((Date.now() - STATE.sessionStartTime) / 60000) : 0;
addLog({type:‘session’, who:‘DM’, what:`Session ${STATE.sessionNumber} ended — ${duration} minutes`});
STATE.sessionActive = false;
STATE.sessionStartTime = null;
STATE.sessionNumber++;
saveAll();
render();
}

function submitLogEntry() {
const who = STATE.manualEntry.who || ‘DM’;
const what = STATE.manualEntry.what;
if (!what || !what.trim()) return;
addLog({type: STATE.manualEntry.type || ‘note’, who, what});
STATE.manualEntry.who = ‘’;
STATE.manualEntry.what = ‘’;
render();
}

function addPin(locationId) {
const nameEl = document.getElementById(‘pin-name’);
const noteEl = document.getElementById(‘pin-note’);
if (!nameEl || !nameEl.value.trim()) return;
STATE.mapPins.push({
id: String(Date.now()),
name: nameEl.value.trim(),
type: STATE.addPinForm.type,
note: noteEl ? noteEl.value.trim() : ‘’,
location: locationId,
addedAt: new Date().toLocaleTimeString([],{hour:‘2-digit’,minute:‘2-digit’})
});
save(‘map_pins’, STATE.mapPins);
STATE.showAddPin = false;
render();
}

function launchRaid() {
if (!STATE.raidParty.length || !STATE.raidLocation) return;
const loc = RAID_LOCATIONS[STATE.raidLocation];
const tier = RAID_TIERS[STATE.raidTier];
const encounters = loc.encounters || [];
const enc = encounters[Math.floor(Math.random() * encounters.length)];
STATE.activeRaid = {tier: STATE.raidTier, location: STATE.raidLocation, encounter: enc};
STATE.raidPhase = 0;
STATE.raidLog = [{time: new Date().toLocaleTimeString([],{hour:‘2-digit’,minute:‘2-digit’}), text:`🚨 ${tier.label} launched — ${loc.name}`, type:‘system’}];
addLog({type:‘raid’, who:‘DM’, what:`Raid launched: ${tier.label} at ${loc.name}`});
render();
}

function nextRaidPhase() {
const tier = RAID_TIERS[STATE.activeRaid?.tier];
if (!tier) return;
if (STATE.raidPhase < tier.phases.length - 1) {
STATE.raidPhase++;
const time = new Date().toLocaleTimeString([],{hour:‘2-digit’,minute:‘2-digit’});
STATE.raidLog.push({time, text:`Phase → ${tier.phases[STATE.raidPhase]}`, type:‘system’});
}
render();
}

function logRaidAction(label, coins) {
const time = new Date().toLocaleTimeString([],{hour:‘2-digit’,minute:‘2-digit’,second:‘2-digit’});
STATE.raidLog.push({time, text:`${label} triggered (${coins.toLocaleString()} coins) — roll d20`, type:‘action’});
render();
}

function endRaid(success) {
const enc = STATE.activeRaid?.encounter;
STATE.raidHistory.push({
tier: STATE.activeRaid?.tier,
location: STATE.activeRaid?.location,
success,
loot: success ? enc?.reward : ‘None — raid failed’,
date: new Date().toLocaleDateString()
});
save(‘raid_history’, STATE.raidHistory);
addLog({type:‘raid’, who:‘DM’, what:`Raid ${success?'succeeded':'failed'}: ${enc?.name||''}`});
STATE.activeRaid = null;
STATE.raidParty = [];
STATE.raidPhase = 0;
STATE.raidLog = [];
render();
}

function upgradeRoom(key) {
const lvl = STATE.baseRooms[key] || 0;
const room = BASE_ROOMS[key];
if (!room || lvl >= 3) return;
STATE.baseRooms[key] = lvl + 1;
save(‘base_rooms’, STATE.baseRooms);
render();
}

function addResident() {
const nameEl = document.getElementById(‘res-name’);
const noteEl = document.getElementById(‘res-note’);
if (!nameEl || !nameEl.value.trim()) return;
const res = {id: String(Date.now()), name: nameEl.value.trim(), role: STATE.residentForm.role, note: noteEl ? noteEl.value.trim() : ‘’};
STATE.baseResidents.push(res);
if (res.role === ‘guard’) STATE.baseDefense = Math.min(10, STATE.baseDefense + 1);
save(‘base_residents’, STATE.baseResidents);
save(‘base_defense’, STATE.baseDefense);
STATE.showAddResident = false;
render();
}

function removeResident(id) {
const res = STATE.baseResidents.find(r => r.id === id);
STATE.baseResidents = STATE.baseResidents.filter(r => r.id !== id);
if (res?.role === ‘guard’) STATE.baseDefense = Math.max(0, STATE.baseDefense - 1);
save(‘base_residents’, STATE.baseResidents);
save(‘base_defense’, STATE.baseDefense);
render();
}

function triggerBaseRaid() {
const ENCOUNTERS = [
{enc:‘Ashen Pack Scouting Party’,difficulty:6},
{enc:‘Kingdom Remnant Patrol’,difficulty:8},
{enc:‘Hollow Entity Drift’,difficulty:10},
{enc:‘Valdris Debt Collector’,difficulty:12},
{enc:‘Thessaly Remapping’,difficulty:14}
];
const e = ENCOUNTERS[Math.floor(Math.random() * ENCOUNTERS.length)];
STATE.baseAttack = {…e, defended: STATE.baseDefense >= e.difficulty};
addLog({type:‘battle’, who:‘DM’, what:`Base raid: ${e.enc} — ${STATE.baseDefense>=e.difficulty?'DEFENDED':'BREACHED'}`});
render();
}

function moveItem(playerId, itemId, fromPack) {
if (fromPack) {
const pack = STATE.packs[playerId] || [];
const item = pack.find(i => i.id === itemId);
if (!item) return;
STATE.packs[playerId] = pack.filter(i => i.id !== itemId);
STATE.vaults[playerId] = […(STATE.vaults[playerId] || []), item];
} else {
const vault = STATE.vaults[playerId] || [];
const item = vault.find(i => i.id === itemId);
if (!item) return;
const p = STATE.players.find(x => x.id === playerId);
const cap = CLASS_PACK_CAP[p?.cls] || 8;
const used = (STATE.packs[playerId] || []).reduce((a, i) => a + (i.slots || 1), 0);
if (used + (item.slots || 1) > cap) return alert(‘Pack full!’);
STATE.vaults[playerId] = vault.filter(i => i.id !== itemId);
STATE.packs[playerId] = […(STATE.packs[playerId] || []), item];
}
save(‘packs’, STATE.packs);
save(‘vaults’, STATE.vaults);
render();
}

function dropItem(playerId, itemId, fromPack) {
if (fromPack) { STATE.packs[playerId] = (STATE.packs[playerId] || []).filter(i => i.id !== itemId); save(‘packs’, STATE.packs); }
else { STATE.vaults[playerId] = (STATE.vaults[playerId] || []).filter(i => i.id !== itemId); save(‘vaults’, STATE.vaults); }
render();
}

function addItemToPlayer(playerId, toPack) {
const ITEM_SLOTS = {weapon:2,armor:2,consumable:1,key:0,material:1,trinket:1,document:0,coin:1};
const name = (document.getElementById(‘item-name’)?.value || ‘’).trim();
if (!name) return alert(‘Item name required.’);
const type = document.getElementById(‘item-type’)?.value || ‘weapon’;
const slots = ITEM_SLOTS[type] ?? 1;
if (toPack) {
const p = STATE.players.find(x => x.id === playerId);
const cap = CLASS_PACK_CAP[p?.cls] || 8;
const used = (STATE.packs[playerId] || []).reduce((a, i) => a + (i.slots || 1), 0);
if (used + slots > cap) return alert(‘Pack full!’);
}
const item = {
id: String(Date.now()),
name, type, slots,
rarity: document.getElementById(‘item-rarity’)?.value || ‘Common’,
condition: document.getElementById(‘item-cond’)?.value || ‘Pristine’,
obtainedBy: document.getElementById(‘item-obtain’)?.value || ‘found’,
provenance: document.getElementById(‘item-prov’)?.value || ‘’,
enchantment: document.getElementById(‘item-ench’)?.value || ‘’,
note: document.getElementById(‘item-note’)?.value || ‘’
};
if (toPack) { STATE.packs[playerId] = […(STATE.packs[playerId] || []), item]; save(‘packs’, STATE.packs); }
else { STATE.vaults[playerId] = […(STATE.vaults[playerId] || []), item]; save(‘vaults’, STATE.vaults); }
STATE.inventoryTab = toPack ? ‘pack’ : ‘vault’;
render();
}

// Boot
if (document.readyState === ‘loading’) {
document.addEventListener(‘DOMContentLoaded’, render);
} else {
render();
}
</script>

</body>
</html>
