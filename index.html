<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>S.Y.N.A.P.S.E. Engine - V2 Cinematic</title>
    <style>
        body { margin: 0; overflow: hidden; background-color: #010103; font-family: sans-serif; user-select: none; -webkit-user-select: none; }
        canvas { display: block; }
        
        #init-screen {
            position: absolute; top: 0; left: 0; width: 100vw; height: 100vh;
            background: #010103; z-index: 100;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            color: #fff; transition: opacity 0.5s ease-out;
        }
        #init-btn {
            padding: 15px 40px; border: 1px solid rgba(255,255,255,0.3); background: rgba(255,255,255,0.05);
            color: white; font-size: 14px; letter-spacing: 2px; text-transform: uppercase;
            cursor: pointer; border-radius: 4px; transition: all 0.3s;
        }
        #init-btn:hover { background: white; color: black; box-shadow: 0 0 15px rgba(255,255,255,0.5); }
        
        #ui { position: absolute; top: 20px; left: 20px; color: rgba(255,255,255,0.4); pointer-events: none; z-index: 10; font-size: 11px; letter-spacing: 1.5px; display: none; }
    </style>

    <script type="importmap">
        {
            "imports": {
                "three": "https://esm.sh/three@0.160.0",
                "three/addons/": "https://esm.sh/three@0.160.0/examples/jsm/"
            }
        }
    </script>
</head>
<body>
    <div id="init-screen">
        <button id="init-btn">Initialize V2 Engine</button>
        <p style="font-size: 10px; color: #666; margin-top: 20px;">Audio Reactivity Standby</p>
    </div>
    <div id="ui">SYSTEM ONLINE // 1M PARTICLES // CINEMATIC PROFILE</div>
    
    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

        let audioCtx, analyser, dataArray;
        let isInitialized = false;

        const scene = new THREE.Scene();
        scene.fog = new THREE.FogExp2(0x010103, 0.012);

        const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(0, 0, 26);

        // Mobile performance locks
        const renderer = new THREE.WebGLRenderer({ antialias: false, powerPreference: "high-performance" });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(1); 
        document.body.appendChild(renderer.domElement);

        const controls = new OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;
        controls.dampingFactor = 0.05;

        // Interaction Raycaster
        const raycaster = new THREE.Raycaster();
        const mouse = new THREE.Vector2();
        const interactPlane = new THREE.Mesh(new THREE.PlaneGeometry(150, 150), new THREE.MeshBasicMaterial({ visible: false }));
        scene.add(interactPlane);

        const targetMouse3D = new THREE.Vector3(0, 0, 0);

        function updateMouse(event) {
            let clientX = event.touches ? event.touches[0].clientX : event.clientX;
            let clientY = event.touches ? event.touches[0].clientY : event.clientY;
            mouse.x = (clientX / window.innerWidth) * 2 - 1;
            mouse.y = -(clientY / window.innerHeight) * 2 + 1;

            raycaster.setFromCamera(mouse, camera);
            const intersects = raycaster.intersectObject(interactPlane);
            if (intersects.length > 0) {
                targetMouse3D.copy(intersects[0].point);
            }
        }

        window.addEventListener('mousemove', updateMouse);
        window.addEventListener('touchmove', updateMouse, { passive: true });

        // Minimal texture for memory
        function createParticleTexture() {
            const canvas = document.createElement('canvas');
            canvas.width = 16; canvas.height = 16; 
            const ctx = canvas.getContext('2d');
            const gradient = ctx.createRadialGradient(8, 8, 0, 8, 8, 8);
            gradient.addColorStop(0, 'rgba(255, 255, 255, 1)');
            gradient.addColorStop(0.2, 'rgba(255, 255, 255, 0.6)');
            gradient.addColorStop(1, 'rgba(0, 0, 0, 0)');
            ctx.fillStyle = gradient;
            ctx.fillRect(0, 0, 16, 16);
            return new THREE.CanvasTexture(canvas);
        }

        const uniforms = {
            uTime: { value: 0.0 },
            uAudioFreq: { value: 0.0 },
            uMouse3D: { value: new THREE.Vector3(0, 0, 0) },
            pointTexture: { value: createParticleTexture() }
        };

        const shaderMaterial = new THREE.ShaderMaterial({
            uniforms: uniforms,
            vertexShader: `
                precision mediump float;
                
                uniform float uTime;
                uniform float uAudioFreq;
                uniform vec3 uMouse3D;
                
                attribute float size;
                attribute vec3 customColor;
                attribute float orbitSpeed;
                attribute vec3 orbitAxis;
                attribute float isStardust; // Used to ignore audio/touch for background particles
                
                varying vec3 vColor;
                
                vec3 rotateAxis(vec3 p, vec3 axis, float angle) {
                    return mix(dot(axis, p) * axis, p, cos(angle)) + cross(axis, p) * sin(angle);
                }

                void main() {
                    vColor = customColor;
                    
                    vec3 pos = rotateAxis(position, orbitAxis, uTime * orbitSpeed);
                    
                    // Only apply interaction physics if it's NOT ambient stardust
                    if (isStardust < 0.5) {
                        float dist = distance(pos, uMouse3D);
                        float interactionRadius = 7.0 + (uAudioFreq * 3.0); 
                        if(dist < interactionRadius) {
                            vec3 pushDir = normalize(pos - uMouse3D);
                            float pushStrength = (interactionRadius - dist) * 0.9;
                            pos += pushDir * pushStrength;
                        }

                        // Audio reactivity (expands the core and rings)
                        float distToCenter = length(pos);
                        if(distToCenter < 12.0) {
                            pos += normalize(pos) * (uAudioFreq * 1.8);
                        }
                    }

                    vec4 mvPosition = modelViewMatrix * vec4(pos, 1.0);
                    
                    // Audio makes things pulse slightly
                    float pulse = isStardust < 0.5 ? (1.0 + (uAudioFreq * 1.5)) : 1.0;
                    float dynamicSize = size * pulse;
                    
                    gl_PointSize = dynamicSize * (250.0 / -mvPosition.z);
                    gl_Position = projectionMatrix * mvPosition;
                }
            `,
            fragmentShader: `
                precision mediump float;
                
                uniform sampler2D pointTexture;
                varying vec3 vColor;
                void main() {
                    gl_FragColor = vec4(vColor, 0.9) * texture2D(pointTexture, gl_PointCoord);
                }
            `,
            blending: THREE.AdditiveBlending,
            depthWrite: false,
            depthTest: false, 
            transparent: true
        });

        // V2 Geometry Breakdown
        const particleCount = 1000000; 
        const stardustCount = 75000;
        const coreCount = 350000;
        const ringCount = particleCount - stardustCount - coreCount; // Remaining 575,000

        const geometry = new THREE.BufferGeometry();
        
        const positions = new Float32Array(particleCount * 3);
        const colors = new Float32Array(particleCount * 3);
        const sizes = new Float32Array(particleCount);
        const orbitSpeeds = new Float32Array(particleCount);
        const orbitAxes = new Float32Array(particleCount * 3);
        const isStardustAttr = new Float32Array(particleCount);

        let currentIndex = 0;

        function addParticle(x, y, z, r, g, b, size, speed, ax, ay, az, stardustFlag) {
            positions[currentIndex*3] = x; positions[currentIndex*3+1] = y; positions[currentIndex*3+2] = z;
            colors[currentIndex*3] = r; colors[currentIndex*3+1] = g; colors[currentIndex*3+2] = b;
            sizes[currentIndex] = size;
            orbitSpeeds[currentIndex] = speed;
            orbitAxes[currentIndex*3] = ax; orbitAxes[currentIndex*3+1] = ay; orbitAxes[currentIndex*3+2] = az;
            isStardustAttr[currentIndex] = stardustFlag;
            currentIndex++;
        }

        // 1. Ambient Stardust (Depth)
        for (let i = 0; i < stardustCount; i++) {
            const spread = 80.0;
            const x = (Math.random() - 0.5) * spread;
            const y = (Math.random() - 0.5) * spread;
            const z = (Math.random() - 0.5) * spread;
            
            // Faint icy blue/white
            const c = new THREE.Color().setHSL(0.6 + Math.random() * 0.1, 0.2, 0.8);
            
            const axis = new THREE.Vector3(Math.random() - 0.5, Math.random() - 0.5, Math.random() - 0.5).normalize();
            addParticle(x, y, z, c.r, c.g, c.b, Math.random() * 0.12 + 0.02, (Math.random() - 0.5) * 0.05, axis.x, axis.y, axis.z, 1.0);
        }

        // 2. Hollow Singularity Core
        for (let i = 0; i < coreCount; i++) {
            // Push particles to the edge of the sphere to create a shell/event horizon
            const radius = 3.8 + (Math.random() * Math.random() * 0.6); 
            const theta = Math.random() * Math.PI * 2;
            const phi = Math.acos((Math.random() * 2) - 1);
            const x = radius * Math.sin(phi) * Math.cos(theta);
            const y = radius * Math.sin(phi) * Math.sin(theta);
            const z = radius * Math.cos(phi);
            
            // Hot Magenta / Neon Orange
            const hue = 0.85 + (Math.random() * 0.15); // Wraps from magenta into red/orange
            const c = new THREE.Color().setHSL(hue > 1.0 ? hue - 1.0 : hue, 1.0, 0.45);
            
            const axis = new THREE.Vector3(Math.random() - 0.5, Math.random() - 0.5, Math.random() - 0.5).normalize();
            addParticle(x, y, z, c.r, c.g, c.b, Math.random() * 0.2 + 0.05, (Math.random() - 0.5) * 0.4, axis.x, axis.y, axis.z, 0.0);
        }

        // 3. Razor-Wire Orbital Bands
        const numRings = 5;
        const ringRadii = [6.5, 8.2, 10.0, 12.5, 15.0];
        const ringTiltX = [0.4, -0.6, 0.8, -0.2, 1.2]; // Aggressive intersecting angles
        const ringTiltZ = [-0.3, 0.5, -0.7, 0.4, -0.9];
        
        for (let i = 0; i < ringCount; i++) {
            const ringIndex = i % numRings;
            
            // Razor thin variation
            const radius = ringRadii[ringIndex] + (Math.random() - 0.5) * 0.25; 
            const angle = Math.random() * Math.PI * 2;
            
            let x = Math.cos(angle) * radius;
            let y = (Math.random() - 0.5) * 0.1; // Extremely flat disk
            let z = Math.sin(angle) * radius;

            // Apply specific tilts to make them cross over each other
            const tx = ringTiltX[ringIndex];
            const tz = ringTiltZ[ringIndex];
            
            let tempY = y * Math.cos(tx) - z * Math.sin(tx);
            let tempZ = y * Math.sin(tx) + z * Math.cos(tx);
            y = tempY; z = tempZ;

            let tempX = x * Math.cos(tz) - y * Math.sin(tz);
            let tempY2 = x * Math.sin(tz) + y * Math.cos(tz);
            x = tempX; y = tempY2;
            
            // Cyberpunk Cyan to Deep Cobalt Blue
            const hue = 0.5 + (ringIndex * 0.04) + (Math.random() * 0.05);
            const c = new THREE.Color().setHSL(hue, 1.0, 0.5);
            
            // Orbit axis is strictly locked to the ring's orientation so they spin perfectly
            const axis = new THREE.Vector3(0, 1, 0); 
            let ax_y = axis.y * Math.cos(tx) - axis.z * Math.sin(tx);
            let ax_z = axis.y * Math.sin(tx) + axis.z * Math.cos(tx);
            let ax_x = axis.x * Math.cos(tz) - ax_y * Math.sin(tz);
            let ax_y2 = axis.x * Math.sin(tz) + ax_y * Math.cos(tz);

            const speed = 0.15 + (Math.random() * 0.1) + (ringIndex * 0.05); // Outer rings spin slightly faster
            
            addParticle(x, y, z, c.r, c.g, c.b, Math.random() * 0.25 + 0.05, speed, ax_x, ax_y2, ax_z, 0.0);
        }

        geometry.setAttribute('position', new THREE.BufferAttribute(positions, 3));
        geometry.setAttribute('customColor', new THREE.BufferAttribute(colors, 3));
        geometry.setAttribute('size', new THREE.BufferAttribute(sizes, 1));
        geometry.setAttribute('orbitSpeed', new THREE.BufferAttribute(orbitSpeeds, 1));
        geometry.setAttribute('orbitAxis', new THREE.BufferAttribute(orbitAxes, 3));
        geometry.setAttribute('isStardust', new THREE.BufferAttribute(isStardustAttr, 1));

        const particleSystem = new THREE.Points(geometry, shaderMaterial);
        particleSystem.frustumCulled = false; 
        scene.add(particleSystem);

        document.getElementById('init-btn').addEventListener('click', async () => {
            try {
                audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                analyser = audioCtx.createAnalyser();
                analyser.fftSize = 256;
                dataArray = new Uint8Array(analyser.frequencyBinCount);
                
                const stream = await navigator.mediaDevices.getUserMedia({ audio: true, video: false });
                const source = audioCtx.createMediaStreamSource(stream);
                source.connect(analyser);
                
                document.getElementById('init-screen').style.opacity = '0';
                setTimeout(() => {
                    document.getElementById('init-screen').style.display = 'none';
                    document.getElementById('ui').style.display = 'block';
                }, 500);

                isInitialized = true;
            } catch (err) {
                alert("Mic access denied. Engine running with static physics.");
                document.getElementById('init-screen').style.display = 'none';
                document.getElementById('ui').style.display = 'block';
                isInitialized = true;
            }
        });

        const clock = new THREE.Clock();

        function animate() {
            requestAnimationFrame(animate);
            if (!isInitialized) return;

            const time = clock.getElapsedTime();
            uniforms.uTime.value = time;
            
            uniforms.uMouse3D.value.lerp(targetMouse3D, 0.1);

            if (analyser) {
                analyser.getByteFrequencyData(dataArray);
                let sum = 0;
                for(let i = 0; i < 20; i++) { sum += dataArray[i]; }
                let averageFreq = sum / 20;
                uniforms.uAudioFreq.value = (averageFreq / 255.0);
            }

            // Macro scene drift
            particleSystem.rotation.y = time * 0.02;
            particleSystem.rotation.x = Math.sin(time * 0.1) * 0.1;
            
            controls.update();
            renderer.render(scene, camera);
        }

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        animate();
    </script>
</body>
</html>
