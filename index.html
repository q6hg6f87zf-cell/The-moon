<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D Particle System</title>
    <style>
        body { margin: 0; overflow: hidden; background-color: #000; }
        canvas { display: block; }
    </style>
</head>
<body>
    <script type="module">
        import * as THREE from 'https://cdn.skypack.dev/three@0.136.0';
        import { OrbitControls } from 'https://cdn.skypack.dev/three@0.136.0/examples/jsm/controls/OrbitControls.js';

        // 1. Scene Setup
        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.z = 15;

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
        document.body.appendChild(renderer.domElement);

        const controls = new OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;

        const positions = [];
        const colors = [];

        // 2. Central Dense Sphere (to match the visual)
        const sphereCount = 40000;
        const sphereRadius = 4;
        for (let k = 0; k < sphereCount; k++) {
            // Fibonacci sphere distribution for even coverage
            const phi = Math.acos(-1 + (2 * k) / sphereCount);
            const theta = Math.sqrt(sphereCount * Math.PI) * phi;
            
            // Add slight noise to the radius
            const r = sphereRadius + (Math.random() - 0.5) * 0.15;
            const x = r * Math.cos(theta) * Math.sin(phi);
            const y = r * Math.sin(theta) * Math.sin(phi);
            const z = r * Math.cos(phi);
            
            positions.push(x, y, z);
            
            // Core purple/pink color
            const color = new THREE.Color().setHSL(0.75 + Math.random() * 0.1, 1, 0.6);
            colors.push(color.r, color.g, color.b);
        }

        // 3. Orbital Rings (incorporating your exact code snippet)
        const count = 3; // Number of outer rings
        const particleCount = 15000; // Particles per ring

        for (let i = 0; i < count; i++) {
            const radius = 6 + i * 1.5;
            const thickness = 0.8 + i * 0.2;
            
            // Random tilt for each ring so they intersect
            const rotX = Math.random() * Math.PI;
            const rotY = Math.random() * Math.PI;

            // YOUR CODE SNIPPET IMPLEMENTATION
            for (let j = 0; j < particleCount; j++) {
                const angle = (j / particleCount) * Math.PI * 2;
                const radiusVariation = radius + (Math.random() - 0.5) * thickness;
                
                let x = Math.cos(angle) * radiusVariation;
                let y = (Math.random() - 0.5) * thickness;
                let z = Math.sin(angle) * radiusVariation;

                // Apply the 3D rotation to tilt the rings
                let tempY = y * Math.cos(rotX) - z * Math.sin(rotX);
                let tempZ = y * Math.sin(rotX) + z * Math.cos(rotX);
                y = tempY; 
                z = tempZ;

                let tempX = x * Math.cos(rotY) + z * Math.sin(rotY);
                z = -x * Math.sin(rotY) + z * Math.cos(rotY);
                x = tempX;

                positions.push(x, y, z);

                // Exact hue logic from your image
                const hue = (i / count) * 0.7 + (j / particleCount) * 0.3;
                const color = new THREE.Color().setHSL(hue, 1, 0.6);
                colors.push(color.r, color.g, color.b);
            }
        }

        // 4. Geometry and Material Assembly
        const geometry = new THREE.BufferGeometry();
        geometry.setAttribute('position', new THREE.Float32BufferAttribute(positions, 3));
        geometry.setAttribute('color', new THREE.Float32BufferAttribute(colors, 3));

        const material = new THREE.PointsMaterial({
            size: 0.03, // Adjust particle size here
            vertexColors: true,
            blending: THREE.AdditiveBlending,
            transparent: true,
            opacity: 0.8,
            depthWrite: false // Prevents particles from occluding each other weirdly
        });

        const particleSystem = new THREE.Points(geometry, material);
        scene.add(particleSystem);

        // 5. Animation Loop
        const clock = new THREE.Clock();
        function animate() {
            requestAnimationFrame(animate);
            const elapsedTime = clock.getElapsedTime();
            
            // Slowly rotate the entire system
            particleSystem.rotation.y = elapsedTime * 0.1;
            particleSystem.rotation.z = elapsedTime * 0.05;
            
            controls.update();
            renderer.render(scene, camera);
        }

        // Handle Window Resize
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        animate();
    </script>
</body>
</html>
