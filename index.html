<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>S.Y.N.A.P.S.E. Engine - Lorenz Attractor</title>
    <style>
        body { margin: 0; overflow: hidden; background-color: #010103; font-family: sans-serif; user-select: none; -webkit-user-select: none; }
        canvas { display: block; }
        #ui { position: absolute; top: 20px; left: 20px; color: rgba(255,255,255,0.4); pointer-events: none; z-index: 10; font-size: 11px; letter-spacing: 1.5px; }
    </style>

    <script type="importmap">
        {
            "imports": {
                "three": "https://esm.sh/three@0.160.0",
                "three/addons/": "https://esm.sh/three@0.160.0/examples/jsm/"
            }
        }
    </script>
</head>
<body>
    <div id="ui">SYSTEM ONLINE // LORENZ ATTRACTOR // 1M PARTICLES</div>
    
    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

        // --- 1. Scene Setup ---
        const scene = new THREE.Scene();
        scene.fog = new THREE.FogExp2(0x010103, 0.015);

        const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(0, -10, 35); // Adjusted camera to frame the Lorenz shape

        // High-performance mobile WebGL settings
        const renderer = new THREE.WebGLRenderer({ antialias: false, powerPreference: "high-performance" });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(1); 
        document.body.appendChild(renderer.domElement);

        const controls = new OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;
        controls.dampingFactor = 0.05;

        // --- 2. Interactive Raycaster (Touch Repulsion) ---
        const raycaster = new THREE.Raycaster();
        const mouse = new THREE.Vector2();
        const interactPlane = new THREE.Mesh(new THREE.PlaneGeometry(200, 200), new THREE.MeshBasicMaterial({ visible: false }));
        scene.add(interactPlane);

        const targetMouse3D = new THREE.Vector3(0, 0, 0);

        function updateMouse(event) {
            let clientX = event.touches ? event.touches[0].clientX : event.clientX;
            let clientY = event.touches ? event.touches[0].clientY : event.clientY;
            mouse.x = (clientX / window.innerWidth) * 2 - 1;
            mouse.y = -(clientY / window.innerHeight) * 2 + 1;

            raycaster.setFromCamera(mouse, camera);
            const intersects = raycaster.intersectObject(interactPlane);
            if (intersects.length > 0) {
                targetMouse3D.copy(intersects[0].point);
            }
        }

        window.addEventListener('mousemove', updateMouse);
        window.addEventListener('touchmove', updateMouse, { passive: true });

        // --- 3. Particle Texture ---
        function createParticleTexture() {
            const canvas = document.createElement('canvas');
            canvas.width = 16; canvas.height = 16; 
            const ctx = canvas.getContext('2d');
            const gradient = ctx.createRadialGradient(8, 8, 0, 8, 8, 8);
            gradient.addColorStop(0, 'rgba(255, 255, 255, 1)');
            gradient.addColorStop(0.3, 'rgba(255, 255, 255, 0.5)');
            gradient.addColorStop(1, 'rgba(0, 0, 0, 0)');
            ctx.fillStyle = gradient;
            ctx.fillRect(0, 0, 16, 16);
            return new THREE.CanvasTexture(canvas);
        }

        // --- 4. Custom Shader Material ---
        const uniforms = {
            uTime: { value: 0.0 },
            uMouse3D: { value: new THREE.Vector3(0, 0, 0) },
            pointTexture: { value: createParticleTexture() }
        };

        const shaderMaterial = new THREE.ShaderMaterial({
            uniforms: uniforms,
            vertexShader: `
                precision mediump float;
                
                uniform float uTime;
                uniform vec3 uMouse3D;
                
                attribute float size;
                attribute vec3 customColor;
                attribute float phase; // Random offset for organic breathing
                
                varying vec3 vColor;

                void main() {
                    vColor = customColor;
                    vec3 pos = position;
                    
                    // Fluid Dynamics: Mouse Repulsion
                    float dist = distance(pos, uMouse3D);
                    if(dist < 8.0) {
                        vec3 pushDir = normalize(pos - uMouse3D);
                        float pushStrength = (8.0 - dist) * 0.6;
                        pos += pushDir * pushStrength;
                    }

                    // Ambient drifting to make the static shape feel alive
                    pos.x += sin(uTime * 1.5 + phase) * 0.15;
                    pos.y += cos(uTime * 1.2 + phase) * 0.15;
                    pos.z += sin(uTime * 1.8 + phase) * 0.15;

                    vec4 mvPosition = modelViewMatrix * vec4(pos, 1.0);
                    gl_PointSize = size * (250.0 / -mvPosition.z);
                    gl_Position = projectionMatrix * mvPosition;
                }
            `,
            fragmentShader: `
                precision mediump float;
                
                uniform sampler2D pointTexture;
                varying vec3 vColor;
                void main() {
                    gl_FragColor = vec4(vColor, 0.9) * texture2D(pointTexture, gl_PointCoord);
                }
            `,
            blending: THREE.AdditiveBlending,
            depthWrite: false,
            depthTest: false, 
            transparent: true
        });

        // --- 5. Lorenz System Data Generation ---
        const particleCount = 1000000; 
        const geometry = new THREE.BufferGeometry();
        
        const positions = new Float32Array(particleCount * 3);
        const colors = new Float32Array(particleCount * 3);
        const sizes = new Float32Array(particleCount);
        const phases = new Float32Array(particleCount);

        // Lorenz Constants
        let lx = 0.1, ly = 0.1, lz = 0.1;
        const sigma = 10.0, rho = 28.0, beta = 8.0 / 3.0;
        const dt = 0.004;

        // Warm up the equations to drop it into the attractor pattern
        for(let i = 0; i < 1000; i++) {
            let dx = sigma * (ly - lx) * dt;
            let dy = (lx * (rho - lz) - ly) * dt;
            let dz = (lx * ly - beta * lz) * dt;
            lx += dx; ly += dy; lz += dz;
        }

        for (let i = 0; i < particleCount; i++) {
            // Step the differential equations
            let dx = sigma * (ly - lx) * dt;
            let dy = (lx * (rho - lz) - ly) * dt;
            let dz = (lx * ly - beta * lz) * dt;
            lx += dx; ly += dy; lz += dz;

            // Inject noise to give the mathematical line physical volume
            const noise = 1.4;
            const px = lx + (Math.random() - 0.5) * noise;
            const py = ly + (Math.random() - 0.5) * noise;
            const pz = lz + (Math.random() - 0.5) * noise;

            const scale = 0.6;
            positions[i*3] = px * scale;
            positions[i*3+1] = py * scale;
            positions[i*3+2] = (pz - 25.0) * scale; // Shift down Z to center the geometry

            // Map color based on Z-axis height (Cyan to Deep Purple)
            const normalizedZ = pz / 50.0; 
            const c = new THREE.Color().setHSL(0.5 + normalizedZ * 0.4, 1.0, 0.55);
            colors[i*3] = c.r; colors[i*3+1] = c.g; colors[i*3+2] = c.b;

            sizes[i] = Math.random() * 0.6 + 0.1;
            phases[i] = Math.random() * Math.PI * 2;
        }

        geometry.setAttribute('position', new THREE.BufferAttribute(positions, 3));
        geometry.setAttribute('customColor', new THREE.BufferAttribute(colors, 3));
        geometry.setAttribute('size', new THREE.BufferAttribute(sizes, 1));
        geometry.setAttribute('phase', new THREE.BufferAttribute(phases, 1));

        const particleSystem = new THREE.Points(geometry, shaderMaterial);
        particleSystem.frustumCulled = false; 
        scene.add(particleSystem);

        // --- 6. Animation Engine ---
        const clock = new THREE.Clock();

        function animate() {
            requestAnimationFrame(animate);

            const time = clock.getElapsedTime();
            uniforms.uTime.value = time;
            uniforms.uMouse3D.value.lerp(targetMouse3D, 0.15);

            // Slowly rotate the entire attractor structure
            particleSystem.rotation.y = time * 0.1;
            particleSystem.rotation.x = Math.sin(time * 0.05) * 0.1;
            
            controls.update();
            renderer.render(scene, camera);
        }

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        // Auto-start immediately
        animate();
    </script>
</body>
</html>
