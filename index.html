<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aseniwuche Winewak Nation - Emblem Engine</title>
    <style>
        body { margin: 0; overflow: hidden; background-color: #010409; font-family: sans-serif; user-select: none; -webkit-user-select: none; }
        canvas { display: block; }
        
        #ui { position: absolute; top: 20px; left: 20px; color: rgba(255, 255, 255, 0.6); pointer-events: none; z-index: 10; font-size: 11px; letter-spacing: 2px; text-transform: uppercase; }
        
        /* Subtle atmospheric gradient overlay */
        #atmosphere {
            position: absolute; top: 0; left: 0; width: 100vw; height: 100vh;
            background: radial-gradient(circle at center, rgba(0, 40, 80, 0.1) 0%, rgba(0, 0, 0, 0.4) 100%);
            pointer-events: none; z-index: 5;
        }
    </style>

    <script type="importmap">
        {
            "imports": {
                "three": "https://esm.sh/three@0.160.0",
                "three/addons/": "https://esm.sh/three@0.160.0/examples/jsm/"
            }
        }
    </script>
</head>
<body>
    <div id="atmosphere"></div>
    <div id="ui">ASENIWUCHE WINEWAK NATION // SPIRIT WIND PHYSICS ACTIVE</div>
    
    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

        // --- 1. Scene Setup ---
        const scene = new THREE.Scene();
        scene.fog = new THREE.FogExp2(0x010409, 0.015);
        
        const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(0, 0, 60);

        const renderer = new THREE.WebGLRenderer({ antialias: false, powerPreference: "high-performance" });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(1); // Mobile optimization lock
        document.body.appendChild(renderer.domElement);

        const controls = new OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;
        controls.dampingFactor = 0.05;
        controls.enablePan = false;

        // --- 2. Emblem Generator & Data Extractor ---
        function generateEmblemData() {
            const canvas = document.createElement('canvas');
            const cw = 1024; const ch = 1024;
            canvas.width = cw; canvas.height = ch;
            const ctx = canvas.getContext('2d');

            // Black background
            ctx.fillStyle = '#000000';
            ctx.fillRect(0, 0, cw, ch);
            
            ctx.fillStyle = '#FFFFFF';
            ctx.strokeStyle = '#FFFFFF';

            // 1. Draw Crest Clipping Mask
            ctx.save();
            ctx.beginPath();
            ctx.arc(cw/2, ch/2 - 80, 260, 0, Math.PI * 2);
            ctx.clip(); // Ensure mountains don't bleed out of the circle

            // 2. Draw the Rocky Mountains
            ctx.beginPath();
            ctx.moveTo(cw/2 - 300, ch/2 + 100);
            ctx.lineTo(cw/2 - 120, ch/2 - 80);  // Peak 1
            ctx.lineTo(cw/2 - 20, ch/2 + 10);   // Valley
            ctx.lineTo(cw/2 + 80, ch/2 - 140);  // Peak 2 (Highest)
            ctx.lineTo(cw/2 + 160, ch/2 - 20);  // Valley
            ctx.lineTo(cw/2 + 300, ch/2 + 100); // Peak 3
            ctx.fill();

            // 3. Draw the Forget-Me-Not (Caribou Conservation Motif)
            const fx = cw/2 - 80;
            const fy = ch/2 - 180;
            for(let i = 0; i < 5; i++) {
                const angle = (i * Math.PI * 2) / 5;
                ctx.beginPath();
                ctx.arc(fx + Math.cos(angle)*18, fy + Math.sin(angle)*18, 15, 0, Math.PI*2);
                ctx.fill();
            }
            // Cut out center of flower
            ctx.fillStyle = '#000000';
            ctx.beginPath();
            ctx.arc(fx, fy, 8, 0, Math.PI*2);
            ctx.fill();
            ctx.fillStyle = '#FFFFFF';

            ctx.restore(); // Remove clipping mask

            // 4. Draw the Crest Border
            ctx.lineWidth = 14;
            ctx.beginPath();
            ctx.arc(cw/2, ch/2 - 80, 260, 0, Math.PI * 2);
            ctx.stroke();
            
            ctx.lineWidth = 4;
            ctx.beginPath();
            ctx.arc(cw/2, ch/2 - 80, 280, 0, Math.PI * 2);
            ctx.stroke();

            // 5. Draw the Nation Title
            ctx.textAlign = "center";
            ctx.textBaseline = "middle";
            ctx.font = 'bold 45px "Trebuchet MS", sans-serif';
            ctx.fillText("ASENIWUCHE WINEWAK NATION", cw/2, ch/2 + 260);
            
            ctx.font = '30px "Trebuchet MS", sans-serif';
            ctx.fillText("R O C K Y   M O U N T A I N   P E O P L E", cw/2, ch/2 + 320);

            return ctx.getImageData(0, 0, cw, ch).data;
        }

        const imgData = generateEmblemData();
        const positions = [];
        const phases = [];
        const isStardust = [];
        
        const cw = 1024; const ch = 1024;
        const step = 2; // High density extraction
        
        // Extract the logo into physical particles
        for (let y = 0; y < ch; y += step) {
            for (let x = 0; x < cw; x += step) {
                const index = (y * cw + x) * 4;
                if (imgData[index] > 100) { 
                    const nx = (x / cw) * 2 - 1;
                    const ny = -(y / ch) * 2 + 1;
                    
                    positions.push(nx * 35, ny * 35, 0); // Flat monumental alignment
                    phases.push(Math.random() * Math.PI * 2); 
                    isStardust.push(0.0); // Marks as a logo particle
                }
            }
        }

        // Add drifting environmental stardust / snow
        for (let i = 0; i < 25000; i++) {
            positions.push((Math.random() - 0.5) * 120);
            positions.push((Math.random() - 0.5) * 120);
            positions.push((Math.random() - 0.5) * 60 - 15); 
            phases.push(Math.random() * Math.PI * 2);
            isStardust.push(1.0); // Marks as environmental
        }

        const geometry = new THREE.BufferGeometry();
        geometry.setAttribute('position', new THREE.Float32BufferAttribute(positions, 3));
        geometry.setAttribute('phase', new THREE.Float32BufferAttribute(phases, 1));
        geometry.setAttribute('isStardust', new THREE.Float32BufferAttribute(isStardust, 1));

        // --- 3. Fluid Dynamic Shader ---
        function createOrbTexture() {
            const canvas = document.createElement('canvas');
            canvas.width = 16; canvas.height = 16; 
            const ctx = canvas.getContext('2d');
            const gradient = ctx.createRadialGradient(8, 8, 0, 8, 8, 8);
            gradient.addColorStop(0, 'rgba(255, 255, 255, 1)');
            gradient.addColorStop(0.3, 'rgba(255, 255, 255, 0.6)');
            gradient.addColorStop(1, 'rgba(0, 0, 0, 0)');
            ctx.fillStyle = gradient;
            ctx.fillRect(0, 0, 16, 16);
            return new THREE.CanvasTexture(canvas);
        }

        const uniforms = {
            uTime: { value: 0.0 },
            uMouse: { value: new THREE.Vector2(999, 999) },
            pointTexture: { value: createOrbTexture() }
        };

        const shaderMaterial = new THREE.ShaderMaterial({
            uniforms: uniforms,
            vertexShader: `
                precision mediump float;
                uniform float uTime;
                uniform vec2 uMouse;
                
                attribute float phase;
                attribute float isStardust;
                
                varying float vOpacity;
                varying vec3 vAnchor;
                varying float vIsStardust;

                void main() {
                    vec3 anchor = position;
                    vAnchor = anchor;
                    vIsStardust = isStardust;
                    vec3 pos = anchor;
                    
                    if (isStardust < 0.5) {
                        // SPIRIT WIND: Slow, majestic breathing for the logo
                        float wind = sin(anchor.x * 0.15 + uTime * 0.8) * cos(anchor.y * 0.15 + uTime * 0.5);
                        pos.z += wind * 1.5;
                        pos.x += sin(uTime * 0.5 + phase) * 0.2;
                        pos.y += cos(uTime * 0.4 + phase) * 0.2;

                        // FLUID VORTEX (Touch Interaction)
                        vec2 mappedMouse = uMouse * 45.0;
                        float dist = distance(anchor.xy, mappedMouse);
                        float force = smoothstep(12.0, 0.0, dist);
                        
                        if (force > 0.0) {
                            // Swirl the particles like a snowstorm
                            float angle = atan(anchor.y - mappedMouse.y, anchor.x - mappedMouse.x);
                            angle += force * 2.5; 
                            
                            vec2 swirlDir = vec2(cos(angle), sin(angle));
                            pos.xy += swirlDir * force * 15.0;
                            pos.z += force * 10.0;
                        }
                        vOpacity = 0.5 + 0.5 * sin(uTime * 1.5 + phase * 5.0);
                    } else {
                        // ENVIRONMENTAL DRIFT
                        pos.x += sin(uTime * 0.1 + phase) * 10.0;
                        pos.y -= uTime * 2.0; // Gentle falling snow
                        // Loop the snow back to the top
                        pos.y = mod(pos.y + 60.0, 120.0) - 60.0;
                        vOpacity = 0.2 + 0.3 * sin(uTime + phase);
                    }

                    vec4 mvPosition = modelViewMatrix * vec4(pos, 1.0);
                    
                    // Sizing
                    float baseSize = isStardust < 0.5 ? 120.0 : 80.0;
                    gl_PointSize = baseSize / -mvPosition.z;
                    
                    gl_Position = projectionMatrix * mvPosition;
                }
            `,
            fragmentShader: `
                precision mediump float;
                uniform sampler2D pointTexture;
                
                varying float vOpacity;
                varying vec3 vAnchor;
                varying float vIsStardust;

                void main() {
                    vec3 finalColor;
                    
                    if (vIsStardust < 0.5) {
                        // LOGO GRADIENT (Forget-Me-Not Blue to Majestic Earth Green/Teal)
                        float normalizedY = clamp((vAnchor.y + 15.0) / 30.0, 0.0, 1.0);
                        vec3 colorTop = vec3(0.1, 0.6, 1.0);    // Glacier Blue
                        vec3 colorBottom = vec3(0.0, 0.8, 0.5); // Forest / Earth Green
                        vec3 colorText = vec3(1.0, 0.85, 0.4);  // Golden Amber for the Nation Text
                        
                        finalColor = mix(colorBottom, colorTop, normalizedY);
                        
                        // Override color for the text at the bottom
                        if (vAnchor.y < -5.0) {
                            finalColor = colorText;
                        }
                    } else {
                        // STARDUST / SNOW (Icy White)
                        finalColor = vec3(0.8, 0.9, 1.0);
                    }

                    gl_FragColor = vec4(finalColor, vOpacity) * texture2D(pointTexture, gl_PointCoord);
                }
            `,
            blending: THREE.AdditiveBlending,
            depthWrite: false,
            depthTest: false,
            transparent: true
        });

        const particleSystem = new THREE.Points(geometry, shaderMaterial);
        particleSystem.frustumCulled = false;
        scene.add(particleSystem);

        // --- 4. Interactive Mechanics ---
        let targetRotX = 0;
        let targetRotY = 0;
        const windowHalfX = window.innerWidth / 2;
        const windowHalfY = window.innerHeight / 2;

        function updateMouse(event) {
            let clientX = event.touches ? event.touches[0].clientX : event.clientX;
            let clientY = event.touches ? event.touches[0].clientY : event.clientY;
            
            targetRotY = ((clientX - windowHalfX) / windowHalfX) * 0.15;
            targetRotX = ((clientY - windowHalfY) / windowHalfY) * 0.15;

            uniforms.uMouse.value.x = (clientX / window.innerWidth) * 2 - 1;
            uniforms.uMouse.value.y = -(clientY / window.innerHeight) * 2 + 1;
        }

        function resetMouse() {
            uniforms.uMouse.value.x = 999;
            uniforms.uMouse.value.y = 999;
        }

        window.addEventListener('mousemove', updateMouse);
        window.addEventListener('touchmove', updateMouse, { passive: true });
        window.addEventListener('mouseleave', resetMouse);
        window.addEventListener('touchend', resetMouse);

        // --- 5. Core Engine Loop ---
        const clock = new THREE.Clock();

        function animate() {
            requestAnimationFrame(animate);
            const time = clock.getElapsedTime();
            uniforms.uTime.value = time;

            // Smooth parallax
            particleSystem.rotation.y += (targetRotY - particleSystem.rotation.y) * 0.05;
            particleSystem.rotation.x += (targetRotX - particleSystem.rotation.x) * 0.05;
            
            renderer.render(scene, camera);
        }

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        animate();
    </script>
</body>
</html>
