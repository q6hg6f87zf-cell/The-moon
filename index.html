<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AWN - Cinematic Engine</title>
    <style>
        body { margin: 0; overflow: hidden; background-color: #010203; font-family: sans-serif; user-select: none; -webkit-user-select: none; }
        canvas { display: block; }
        
        #ui { position: absolute; top: 20px; left: 20px; color: rgba(255, 255, 255, 0.5); pointer-events: none; z-index: 10; font-size: 11px; letter-spacing: 2px; text-transform: uppercase; }
        
        #atmosphere {
            position: absolute; top: 0; left: 0; width: 100vw; height: 100vh;
            background: radial-gradient(circle at center, rgba(0, 30, 60, 0.05) 0%, rgba(0, 0, 0, 0.5) 100%);
            pointer-events: none; z-index: 5;
        }
    </style>

    <script type="importmap">
        {
            "imports": {
                "three": "https://esm.sh/three@0.160.0",
                "three/addons/": "https://esm.sh/three@0.160.0/examples/jsm/"
            }
        }
    </script>
</head>
<body>
    <div id="atmosphere"></div>
    <div id="ui">AWN // ADAPTIVE OPTICS // TAP TO ASSEMBLE</div>
    
    <script type="module">
        import * as THREE from 'three';
        import { EffectComposer } from 'three/addons/postprocessing/EffectComposer.js';
        import { RenderPass } from 'three/addons/postprocessing/RenderPass.js';
        import { UnrealBloomPass } from 'three/addons/postprocessing/UnrealBloomPass.js';

        // --- 1. Scene & Camera Setup ---
        const scene = new THREE.Scene();
        scene.fog = new THREE.FogExp2(0x010203, 0.015);
        
        // Camera starts DEEP inside the particle storm for cinematic pull-out
        const camera = new THREE.PerspectiveCamera(50, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(0, 0, 10); 
        let targetCameraZ = 75.0; // The final resting position

        const renderer = new THREE.WebGLRenderer({ antialias: false, powerPreference: "high-performance" });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(1); 
        document.body.appendChild(renderer.domElement);

        // --- 2. Adaptive Post-Processing (Bloom) ---
        const renderScene = new RenderPass(scene, camera);
        
        // Highly optimized mobile bloom pass
        const bloomPass = new UnrealBloomPass(new THREE.Vector2(window.innerWidth/2, window.innerHeight/2), 1.5, 0.4, 0.85);
        bloomPass.threshold = 0.2;
        bloomPass.strength = 0.5; // Base glow
        bloomPass.radius = 0.8;

        const composer = new EffectComposer(renderer);
        composer.addPass(renderScene);
        composer.addPass(bloomPass);

        // --- 3. Data Extractor ---
        function generateEmblemData() {
            const canvas = document.createElement('canvas');
            const cw = 1024; const ch = 1024;
            canvas.width = cw; canvas.height = ch;
            const ctx = canvas.getContext('2d');

            ctx.fillStyle = '#000000';
            ctx.fillRect(0, 0, cw, ch);
            ctx.fillStyle = '#FFFFFF';
            ctx.strokeStyle = '#FFFFFF';

            ctx.save();
            ctx.beginPath();
            ctx.arc(cw/2, ch/2 - 80, 260, 0, Math.PI * 2);
            ctx.clip(); 

            ctx.beginPath();
            ctx.moveTo(cw/2 - 300, ch/2 + 100);
            ctx.lineTo(cw/2 - 120, ch/2 - 80);  
            ctx.lineTo(cw/2 - 20, ch/2 + 10);   
            ctx.lineTo(cw/2 + 80, ch/2 - 140);  
            ctx.lineTo(cw/2 + 160, ch/2 - 20);  
            ctx.lineTo(cw/2 + 300, ch/2 + 100); 
            ctx.fill();

            const fx = cw/2;
            const fy = ch/2 - 190;
            for(let i = 0; i < 6; i++) {
                const angle = (i * Math.PI * 2) / 6;
                ctx.beginPath();
                ctx.arc(fx + Math.cos(angle)*20, fy + Math.sin(angle)*20, 16, 0, Math.PI*2);
                ctx.fill();
            }
            ctx.fillStyle = '#000000';
            ctx.beginPath();
            ctx.arc(fx, fy, 8, 0, Math.PI*2);
            ctx.fill();
            ctx.fillStyle = '#FFFFFF';

            ctx.restore(); 

            ctx.lineWidth = 14;
            ctx.beginPath();
            ctx.arc(cw/2, ch/2 - 80, 260, 0, Math.PI * 2);
            ctx.stroke();
            
            ctx.lineWidth = 4;
            ctx.beginPath();
            ctx.arc(cw/2, ch/2 - 80, 280, 0, Math.PI * 2);
            ctx.stroke();

            ctx.textAlign = "center";
            ctx.textBaseline = "middle";
            ctx.font = 'bold 45px "Trebuchet MS", sans-serif';
            ctx.fillText("ASENIWUCHE WINEWAK NATION", cw/2, ch/2 + 260);
            
            ctx.font = 'bold 30px "Trebuchet MS", sans-serif'; 
            ctx.fillText("ROCKY MOUNTAIN PEOPLE", cw/2, ch/2 + 320);

            return ctx.getImageData(0, 0, cw, ch).data;
        }

        const imgData = generateEmblemData();
        const posAurora = []; 
        const posLogo = [];   
        const phases = [];
        const isStardust = []; 
        
        const cw = 1024; const ch = 1024;
        const step = 2; 
        
        for (let y = 0; y < ch; y += step) {
            for (let x = 0; x < cw; x += step) {
                const index = (y * cw + x) * 4;
                if (imgData[index] > 100) { 
                    const nx = (x / cw) * 2 - 1;
                    const ny = -(y / ch) * 2 + 1;
                    
                    posLogo.push(nx * 40.0, ny * 40.0, 0.0);
                    
                    const radius = 20.0 + Math.random() * 45.0;
                    const theta = Math.random() * Math.PI * 2;
                    const phi = Math.acos((Math.random() * 2) - 1);
                    
                    posAurora.push(
                        radius * Math.sin(phi) * Math.cos(theta),
                        radius * Math.sin(phi) * Math.sin(theta),
                        radius * Math.cos(phi)
                    );
                    
                    phases.push(Math.random() * Math.PI * 2); 
                    isStardust.push(0.0);
                }
            }
        }

        for (let i = 0; i < 300000; i++) {
            const ax = (Math.random() - 0.5) * 200;
            const ay = (Math.random() - 0.5) * 200;
            const az = (Math.random() - 0.5) * 150 - 50;
            
            posAurora.push(ax, ay, az);
            posLogo.push(ax, ay, az); 
            
            phases.push(Math.random() * Math.PI * 2);
            isStardust.push(1.0);
        }

        const geometry = new THREE.BufferGeometry();
        geometry.setAttribute('position', new THREE.Float32BufferAttribute(posAurora, 3)); 
        geometry.setAttribute('targetPos', new THREE.Float32BufferAttribute(posLogo, 3));  
        geometry.setAttribute('phase', new THREE.Float32BufferAttribute(phases, 1));
        geometry.setAttribute('isStardust', new THREE.Float32BufferAttribute(isStardust, 1));

        // --- 4. Fluid Dynamic Shader ---
        function createOrbTexture() {
            const canvas = document.createElement('canvas');
            canvas.width = 16; canvas.height = 16; 
            const ctx = canvas.getContext('2d');
            const gradient = ctx.createRadialGradient(8, 8, 0, 8, 8, 8);
            gradient.addColorStop(0, 'rgba(255, 255, 255, 1)');
            gradient.addColorStop(0.3, 'rgba(255, 255, 255, 0.5)');
            gradient.addColorStop(1, 'rgba(0, 0, 0, 0)');
            ctx.fillStyle = gradient;
            ctx.fillRect(0, 0, 16, 16);
            return new THREE.CanvasTexture(canvas);
        }

        const uniforms = {
            uTime: { value: 0.0 },
            uMouse: { value: new THREE.Vector2(999, 999) },
            uMorphProgress: { value: 0.0 },
            pointTexture: { value: createOrbTexture() }
        };

        const shaderMaterial = new THREE.ShaderMaterial({
            uniforms: uniforms,
            vertexShader: `
                precision mediump float;
                uniform float uTime;
                uniform vec2 uMouse;
                uniform float uMorphProgress;
                
                attribute float phase;
                attribute vec3 targetPos;
                attribute float isStardust;
                
                varying float vOpacity;
                varying vec3 vColorData; 
                varying float vIsStardust;

                vec3 turbulence(vec3 p) {
                    float t = uTime * 0.4;
                    float x = sin(p.y * 0.1 + t) * cos(p.z * 0.1 + phase);
                    float y = sin(p.z * 0.1 + t) * cos(p.x * 0.1 + phase);
                    float z = sin(p.x * 0.1 + t) * cos(p.y * 0.1 + phase);
                    return vec3(x, y, z);
                }

                void main() {
                    vIsStardust = isStardust;
                    vec3 auroraPos = position;
                    vec3 crestPos = targetPos;
                    vec3 currentPos;
                    
                    if (isStardust < 0.5) {
                        vec3 wind = turbulence(auroraPos) * 10.0;
                        auroraPos += wind;
                        
                        crestPos.z += sin(crestPos.x * 0.1 + uTime * 1.5) * 2.0;

                        float individualMorph = clamp(uMorphProgress * 1.2 - (phase * 0.03), 0.0, 1.0);
                        float p = individualMorph;
                        float ease = p < 0.5 ? 2.0 * p * p : -1.0 + (4.0 - 2.0 * p) * p;
                        
                        currentPos = mix(auroraPos, crestPos, ease);

                        vec2 mappedMouse = uMouse * 55.0;
                        float dist = distance(currentPos.xy, mappedMouse);
                        float force = smoothstep(20.0, 0.0, dist);
                        
                        if (force > 0.0) {
                            float angle = atan(currentPos.y - mappedMouse.y, currentPos.x - mappedMouse.x);
                            angle += force * 5.0; 
                            currentPos.xy += vec2(cos(angle), sin(angle)) * force * 22.0;
                            currentPos.z += force * 18.0;
                        }

                        vColorData = vec3(crestPos.y, ease, force);
                        vOpacity = 0.5 + 0.5 * sin(uTime * 2.0 + phase);
                    } else {
                        currentPos = auroraPos;
                        currentPos.y -= uTime * 2.5;
                        currentPos.y = mod(currentPos.y + 100.0, 200.0) - 100.0;
                        currentPos.x += sin(uTime * 0.15 + phase) * 6.0;
                        vColorData = vec3(0.0);
                        vOpacity = 0.1 + 0.2 * sin(uTime + phase);
                    }

                    vec4 mvPosition = modelViewMatrix * vec4(currentPos, 1.0);
                    
                    float interactionScale = isStardust < 0.5 ? (vColorData.z * 60.0) : 0.0;
                    float baseSize = isStardust < 0.5 ? 130.0 : 70.0;
                    gl_PointSize = (baseSize + interactionScale) / -mvPosition.z;
                    
                    gl_Position = projectionMatrix * mvPosition;
                }
            `,
            fragmentShader: `
                precision mediump float;
                uniform sampler2D pointTexture;
                
                varying float vOpacity;
                varying vec3 vColorData;
                varying float vIsStardust;

                void main() {
                    vec3 finalColor;
                    
                    if (vIsStardust < 0.5) {
                        float crestY = vColorData.x;
                        float ease = vColorData.y;
                        float force = vColorData.z;
                        
                        vec3 colorAurora1 = vec3(0.0, 1.0, 0.5); 
                        vec3 colorAurora2 = vec3(0.1, 0.3, 1.0); 
                        
                        vec3 colorGlacier = vec3(0.1, 0.8, 1.0);     
                        vec3 colorEarth = vec3(0.0, 0.6, 0.4);      
                        vec3 colorGold = vec3(1.0, 0.8, 0.2); 
                        
                        float auroraMix = sin(crestY * 0.1) * 0.5 + 0.5;
                        vec3 auroraColor = mix(colorAurora2, colorAurora1, auroraMix);

                        float normalizedY = clamp((crestY + 20.0) / 40.0, 0.0, 1.0);
                        vec3 crestColor = mix(colorEarth, colorGlacier, normalizedY);
                        if (crestY < -10.0) crestColor = colorGold; 
                        
                        finalColor = mix(auroraColor, crestColor, ease);
                        finalColor = mix(finalColor, vec3(1.0, 1.0, 1.0), force * 0.9);
                        
                    } else {
                        finalColor = vec3(0.7, 0.8, 1.0);
                    }

                    gl_FragColor = vec4(finalColor, vOpacity) * texture2D(pointTexture, gl_PointCoord);
                }
            `,
            blending: THREE.AdditiveBlending,
            depthWrite: false,
            depthTest: false,
            transparent: true
        });

        const particleSystem = new THREE.Points(geometry, shaderMaterial);
        particleSystem.frustumCulled = false;
        scene.add(particleSystem);

        // --- 5. High-Inertia Mechanics ---
        let currentRotX = 0; let currentRotY = 0;
        let targetRotX = 0;  let targetRotY = 0;
        let isLogoState = false;
        let targetMorph = 0.0;
        let targetBloom = 0.5;
        const windowHalfX = window.innerWidth / 2;
        const windowHalfY = window.innerHeight / 2;

        function updateMouse(event) {
            let clientX = event.touches ? event.touches[0].clientX : event.clientX;
            let clientY = event.touches ? event.touches[0].clientY : event.clientY;
            
            targetRotY = ((clientX - windowHalfX) / windowHalfX) * 0.2;
            targetRotX = ((clientY - windowHalfY) / windowHalfY) * 0.2;

            uniforms.uMouse.value.x = (clientX / window.innerWidth) * 2 - 1;
            uniforms.uMouse.value.y = -(clientY / window.innerHeight) * 2 + 1;
        }

        function resetMouse() {
            uniforms.uMouse.value.x = 999;
            uniforms.uMouse.value.y = 999;
            targetRotX = 0; targetRotY = 0;
        }

        function toggleMorph() {
             isLogoState = !isLogoState;
             targetMorph = isLogoState ? 1.0 : 0.0;
             targetBloom = 2.5; // Spike bloom on impact
             
             document.getElementById('ui').innerText = isLogoState 
                ? "AWN // CREST LOCKED // TAP TO SHATTER" 
                : "AWN // STORM NEBULA ACTIVE // TAP TO ASSEMBLE";
        }

        window.addEventListener('mousemove', updateMouse);
        window.addEventListener('touchmove', updateMouse, { passive: true });
        window.addEventListener('mouseleave', resetMouse);
        window.addEventListener('touchend', resetMouse);
        
        window.addEventListener('mousedown', toggleMorph);
        window.addEventListener('touchstart', toggleMorph, { passive: true });

        // --- 6. Core Engine Loop ---
        const clock = new THREE.Clock();

        function animate() {
            requestAnimationFrame(animate);
            const time = clock.getElapsedTime();
            uniforms.uTime.value = time;

            // 1. Camera Cinematic Fly-Through
            camera.position.z += (targetCameraZ - camera.position.z) * 0.02;

            // 2. Adaptive Bloom Cooling
            bloomPass.strength += (0.5 - bloomPass.strength) * 0.03; // Slowly cools back to base 0.5
            if(targetBloom > 0.5) {
                bloomPass.strength = targetBloom;
                targetBloom = 0.5; // Reset trigger
            }

            // 3. Morph State
            uniforms.uMorphProgress.value += (targetMorph - uniforms.uMorphProgress.value) * 0.04;

            // 4. Heavy Inertial Drag on Rotation
            currentRotX += (targetRotX - currentRotX) * 0.03;
            currentRotY += (targetRotY - currentRotY) * 0.03;

            if (!isLogoState) {
                particleSystem.rotation.y += 0.003;
                particleSystem.rotation.x += 0.001;
            } else {
                particleSystem.rotation.y = currentRotY;
                particleSystem.rotation.x = currentRotX;
            }
            
            composer.render();
        }

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
            composer.setSize(window.innerWidth, window.innerHeight);
        });

        animate();
    </script>
</body>
</html>
