<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>S.Y.N.A.P.S.E. Particle Engine</title>
    <style>
        body { margin: 0; overflow: hidden; background-color: #010102; font-family: sans-serif; user-select: none; -webkit-user-select: none; }
        canvas { display: block; }
        
        /* Initialization Overlay */
        #init-screen {
            position: absolute; top: 0; left: 0; width: 100vw; height: 100vh;
            background: #010102; z-index: 100;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            color: #fff; transition: opacity 0.5s ease-out;
        }
        #init-btn {
            padding: 15px 40px; border: 1px solid rgba(255,255,255,0.3); background: rgba(255,255,255,0.05);
            color: white; font-size: 14px; letter-spacing: 2px; text-transform: uppercase;
            cursor: pointer; border-radius: 4px; transition: all 0.3s;
        }
        #init-btn:hover { background: white; color: black; }
        
        #ui { position: absolute; top: 20px; left: 20px; color: rgba(255,255,255,0.4); pointer-events: none; z-index: 10; font-size: 11px; letter-spacing: 1.5px; display: none; }
    </style>

    <script type="importmap">
        {
            "imports": {
                "three": "https://esm.sh/three@0.160.0",
                "three/addons/": "https://esm.sh/three@0.160.0/examples/jsm/"
            }
        }
    </script>
</head>
<body>
    <div id="init-screen">
        <button id="init-btn">Initialize Engine</button>
        <p style="font-size: 10px; color: #666; margin-top: 20px;">Requires Microphone Access for Audio Reactivity</p>
    </div>
    <div id="ui">SYSTEM ONLINE // GPU PHYSICS ACTIVE // MIC REACTIVE</div>
    
    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

        let audioCtx, analyser, dataArray;
        let isInitialized = false;

        // --- 1. Scene & Setup ---
        const scene = new THREE.Scene();
        scene.fog = new THREE.FogExp2(0x010102, 0.015);

        const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(0, 0, 25);

        // We drop heavy post-processing to ensure mobile compatibility, relying on custom shader glow instead
        const renderer = new THREE.WebGLRenderer({ antialias: true, powerPreference: "high-performance" });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
        document.body.appendChild(renderer.domElement);

        const controls = new OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;
        controls.dampingFactor = 0.05;
        controls.enableZoom = true;

        // --- 2. Interactive Raycaster (Fluid Touch) ---
        const raycaster = new THREE.Raycaster();
        const mouse = new THREE.Vector2();
        const planeGeo = new THREE.PlaneGeometry(100, 100);
        const planeMat = new THREE.MeshBasicMaterial({ visible: false });
        const interactPlane = new THREE.Mesh(planeGeo, planeMat);
        scene.add(interactPlane);

        const targetMouse3D = new THREE.Vector3(0, 0, 0);

        function updateMouse(event) {
            let clientX = event.touches ? event.touches[0].clientX : event.clientX;
            let clientY = event.touches ? event.touches[0].clientY : event.clientY;
            mouse.x = (clientX / window.innerWidth) * 2 - 1;
            mouse.y = -(clientY / window.innerHeight) * 2 + 1;

            raycaster.setFromCamera(mouse, camera);
            const intersects = raycaster.intersectObject(interactPlane);
            if (intersects.length > 0) {
                targetMouse3D.copy(intersects[0].point);
            }
        }

        window.addEventListener('mousemove', updateMouse);
        window.addEventListener('touchmove', updateMouse, { passive: true });

        // --- 3. GPU Shader System (Physics + Audio + Interaction) ---
        function createParticleTexture() {
            const canvas = document.createElement('canvas');
            canvas.width = 64; canvas.height = 64;
            const ctx = canvas.getContext('2d');
            const gradient = ctx.createRadialGradient(32, 32, 0, 32, 32, 32);
            gradient.addColorStop(0, 'rgba(255, 255, 255, 1)');
            gradient.addColorStop(0.3, 'rgba(255, 255, 255, 0.6)');
            gradient.addColorStop(1, 'rgba(0, 0, 0, 0)');
            ctx.fillStyle = gradient;
            ctx.fillRect(0, 0, 64, 64);
            return new THREE.CanvasTexture(canvas);
        }

        const uniforms = {
            uTime: { value: 0.0 },
            uAudioFreq: { value: 0.0 },
            uMouse3D: { value: new THREE.Vector3(0, 0, 0) },
            pointTexture: { value: createParticleTexture() }
        };

        const shaderMaterial = new THREE.ShaderMaterial({
            uniforms: uniforms,
            vertexShader: `
                uniform float uTime;
                uniform float uAudioFreq;
                uniform vec3 uMouse3D;
                
                attribute float size;
                attribute vec3 customColor;
                attribute float orbitSpeed;
                attribute vec3 orbitAxis;
                
                varying vec3 vColor;
                
                // Helper to rotate vector around axis
                vec3 rotateAxis(vec3 p, vec3 axis, float angle) {
                    return mix(dot(axis, p) * axis, p, cos(angle)) + cross(axis, p) * sin(angle);
                }

                void main() {
                    vColor = customColor;
                    
                    // 1. Calculate base orbital motion
                    vec3 pos = rotateAxis(position, orbitAxis, uTime * orbitSpeed);
                    
                    // 2. Fluid Dynamics: Mouse Repulsion
                    float dist = distance(pos, uMouse3D);
                    float interactionRadius = 6.0 + (uAudioFreq * 2.0); // Audio increases interaction range
                    if(dist < interactionRadius) {
                        vec3 pushDir = normalize(pos - uMouse3D);
                        float pushStrength = (interactionRadius - dist) * 0.8;
                        pos += pushDir * pushStrength;
                    }

                    // 3. Audio Reactivity: Core expansion
                    float distToCenter = length(pos);
                    if(distToCenter < 6.0) {
                        pos += normalize(pos) * (uAudioFreq * 1.5);
                    }

                    vec4 mvPosition = modelViewMatrix * vec4(pos, 1.0);
                    
                    // Scale particles based on distance, size attribute, and audio spikes
                    float dynamicSize = size * (1.0 + (uAudioFreq * 1.2));
                    gl_PointSize = dynamicSize * (250.0 / -mvPosition.z);
                    gl_Position = projectionMatrix * mvPosition;
                }
            `,
            fragmentShader: `
                uniform sampler2D pointTexture;
                varying vec3 vColor;
                void main() {
                    gl_FragColor = vec4(vColor, 1.0) * texture2D(pointTexture, gl_PointCoord);
                }
            `,
            blending: THREE.AdditiveBlending,
            depthWrite: false,
            transparent: true
        });

        // --- 4. Buffer Geometry Generation ---
        const particleCount = 150000; // Pushing the GPU limits
        const geometry = new THREE.BufferGeometry();
        
        const positions = new Float32Array(particleCount * 3);
        const colors = new Float32Array(particleCount * 3);
        const sizes = new Float32Array(particleCount);
        const orbitSpeeds = new Float32Array(particleCount);
        const orbitAxes = new Float32Array(particleCount * 3);

        for (let i = 0; i < particleCount; i++) {
            // Mix of core sphere (70%) and outer rings (30%)
            let x, y, z, r, g, b, radius;
            
            if (i < particleCount * 0.7) {
                // Core
                radius = 3.5 + Math.random() * 1.5;
                const theta = Math.random() * Math.PI * 2;
                const phi = Math.acos((Math.random() * 2) - 1);
                x = radius * Math.sin(phi) * Math.cos(theta);
                y = radius * Math.sin(phi) * Math.sin(theta);
                z = radius * Math.cos(phi);
                
                const c = new THREE.Color().setHSL(0.75 + Math.random() * 0.1, 0.8, 0.6);
                r = c.r; g = c.g; b = c.b;
                sizes[i] = Math.random() * 1.5 + 0.5;
            } else {
                // Rings
                radius = 7.0 + Math.random() * 8.0;
                const angle = Math.random() * Math.PI * 2;
                x = Math.cos(angle) * radius;
                y = (Math.random() - 0.5) * 1.5;
                z = Math.sin(angle) * radius;
                
                const c = new THREE.Color().setHSL(0.6 + Math.random() * 0.3, 1, 0.5);
                r = c.r; g = c.g; b = c.b;
                sizes[i] = Math.random() * 2.5 + 1.0;
            }

            positions[i*3] = x; positions[i*3+1] = y; positions[i*3+2] = z;
            colors[i*3] = r; colors[i*3+1] = g; colors[i*3+2] = b;
            
            // Assign random orbital vectors directly to attributes for the GPU
            orbitSpeeds[i] = (Math.random() - 0.5) * 0.5;
            
            const axis = new THREE.Vector3(Math.random() - 0.5, Math.random() - 0.5, Math.random() - 0.5).normalize();
            orbitAxes[i*3] = axis.x; orbitAxes[i*3+1] = axis.y; orbitAxes[i*3+2] = axis.z;
        }

        geometry.setAttribute('position', new THREE.BufferAttribute(positions, 3));
        geometry.setAttribute('customColor', new THREE.BufferAttribute(colors, 3));
        geometry.setAttribute('size', new THREE.BufferAttribute(sizes, 1));
        geometry.setAttribute('orbitSpeed', new THREE.BufferAttribute(orbitSpeeds, 1));
        geometry.setAttribute('orbitAxis', new THREE.BufferAttribute(orbitAxes, 3));

        const particleSystem = new THREE.Points(geometry, shaderMaterial);
        scene.add(particleSystem);

        // --- 5. System Initialization & Audio Capture ---
        document.getElementById('init-btn').addEventListener('click', async () => {
            try {
                audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                analyser = audioCtx.createAnalyser();
                analyser.fftSize = 256;
                dataArray = new Uint8Array(analyser.frequencyBinCount);
                
                const stream = await navigator.mediaDevices.getUserMedia({ audio: true, video: false });
                const source = audioCtx.createMediaStreamSource(stream);
                source.connect(analyser);
                
                document.getElementById('init-screen').style.opacity = '0';
                setTimeout(() => {
                    document.getElementById('init-screen').style.display = 'none';
                    document.getElementById('ui').style.display = 'block';
                }, 500);

                isInitialized = true;
            } catch (err) {
                alert("Microphone access denied. The visualizer will run, but audio reactivity is disabled.");
                document.getElementById('init-screen').style.display = 'none';
                document.getElementById('ui').style.display = 'block';
                isInitialized = true;
            }
        });

        // --- 6. Animation Loop ---
        const clock = new THREE.Clock();

        function animate() {
            requestAnimationFrame(animate);
            if (!isInitialized) return;

            const time = clock.getElapsedTime();
            uniforms.uTime.value = time;
            
            // Smoothly interpolate 3D mouse position for the shader
            uniforms.uMouse3D.value.lerp(targetMouse3D, 0.1);

            // Process Audio Frequencies
            if (analyser) {
                analyser.getByteFrequencyData(dataArray);
                let sum = 0;
                // Focus on lower frequencies (bass/voice)
                for(let i = 0; i < 20; i++) { sum += dataArray[i]; }
                let averageFreq = sum / 20;
                // Normalize and pass to shader
                uniforms.uAudioFreq.value = (averageFreq / 255.0);
            }

            // Macro scene rotation
            particleSystem.rotation.y = time * 0.05;
            
            controls.update();
            renderer.render(scene, camera);
        }

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        animate();
    </script>
</body>
</html>
