<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>High-Performance Particle System</title>
    <style>
        body { margin: 0; overflow: hidden; background-color: #020204; font-family: sans-serif; }
        canvas { display: block; }
        #ui { position: absolute; top: 20px; left: 20px; color: rgba(255,255,255,0.5); pointer-events: none; z-index: 10; font-size: 12px; letter-spacing: 1px; }
    </style>

    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
            }
        }
    </script>
</head>
<body>
    <div id="ui">SYSTEM ONLINE // PARALLAX ACTIVE</div>
    
    <script type="module">
        // Now we can import cleanly just like a Node.js environment
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
        import { EffectComposer } from 'three/addons/postprocessing/EffectComposer.js';
        import { RenderPass } from 'three/addons/postprocessing/RenderPass.js';
        import { UnrealBloomPass } from 'three/addons/postprocessing/UnrealBloomPass.js';

        // --- Texture Generator ---
        function createParticleTexture() {
            const canvas = document.createElement('canvas');
            canvas.width = 64; canvas.height = 64;
            const context = canvas.getContext('2d');
            
            const gradient = context.createRadialGradient(32, 32, 0, 32, 32, 32);
            gradient.addColorStop(0, 'rgba(255, 255, 255, 1)');
            gradient.addColorStop(0.2, 'rgba(255, 255, 255, 0.8)');
            gradient.addColorStop(0.5, 'rgba(255, 255, 255, 0.2)');
            gradient.addColorStop(1, 'rgba(0, 0, 0, 0)');
            
            context.fillStyle = gradient;
            context.fillRect(0, 0, 64, 64);
            
            return new THREE.CanvasTexture(canvas);
        }

        // --- Scene & Setup ---
        const scene = new THREE.Scene();
        scene.fog = new THREE.FogExp2(0x020204, 0.015);

        const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(0, 2, 22);

        const renderer = new THREE.WebGLRenderer({ antialias: false, powerPreference: "high-performance" });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
        document.body.appendChild(renderer.domElement);

        const controls = new OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;
        controls.dampingFactor = 0.05;
        controls.enablePan = false;

        // --- Post-Processing ---
        const renderScene = new RenderPass(scene, camera);
        const bloomPass = new UnrealBloomPass(new THREE.Vector2(window.innerWidth, window.innerHeight), 1.5, 0.4, 0.85);
        bloomPass.threshold = 0.15;
        bloomPass.strength = 1.4; 
        bloomPass.radius = 0.6;

        const composer = new EffectComposer(renderer);
        composer.addPass(renderScene);
        composer.addPass(bloomPass);

        // --- Master Group & Materials ---
        const masterGroup = new THREE.Group();
        scene.add(masterGroup);

        const particleTexture = createParticleTexture();

        const shaderMaterial = new THREE.ShaderMaterial({
            uniforms: {
                pointTexture: { value: particleTexture }
            },
            vertexShader: `
                attribute float size;
                attribute vec3 customColor;
                varying vec3 vColor;
                void main() {
                    vColor = customColor;
                    vec4 mvPosition = modelViewMatrix * vec4(position, 1.0);
                    gl_PointSize = size * (300.0 / -mvPosition.z);
                    gl_Position = projectionMatrix * mvPosition;
                }
            `,
            fragmentShader: `
                uniform sampler2D pointTexture;
                varying vec3 vColor;
                void main() {
                    gl_FragColor = vec4(vColor, 1.0) * texture2D(pointTexture, gl_PointCoord);
                }
            `,
            blending: THREE.AdditiveBlending,
            depthWrite: false,
            transparent: true
        });

        // --- Central Core ---
        const sphereCount = 60000;
        const coreGeo = new THREE.BufferGeometry();
        const corePositions = new Float32Array(sphereCount * 3);
        const coreColors = new Float32Array(sphereCount * 3);
        const coreSizes = new Float32Array(sphereCount);

        const sphereRadius = 4.5;

        for (let k = 0; k < sphereCount; k++) {
            const phi = Math.acos(-1 + (2 * k) / sphereCount);
            const theta = Math.sqrt(sphereCount * Math.PI) * phi;
            const r = sphereRadius + (Math.random() - 0.5) * 0.2;
            
            corePositions[k*3] = r * Math.cos(theta) * Math.sin(phi);
            corePositions[k*3+1] = r * Math.sin(theta) * Math.sin(phi);
            corePositions[k*3+2] = r * Math.cos(phi);
            
            const color = new THREE.Color().setHSL(0.78 + Math.random() * 0.08, 0.9, 0.5);
            coreColors[k*3] = color.r;
            coreColors[k*3+1] = color.g;
            coreColors[k*3+2] = color.b;

            coreSizes[k] = Math.random() * 1.5 + 0.5;
        }

        coreGeo.setAttribute('position', new THREE.BufferAttribute(corePositions, 3));
        coreGeo.setAttribute('customColor', new THREE.BufferAttribute(coreColors, 3));
        coreGeo.setAttribute('size', new THREE.BufferAttribute(coreSizes, 1));
        
        const coreMesh = new THREE.Points(coreGeo, shaderMaterial);
        masterGroup.add(coreMesh);

        // --- Orbital Rings ---
        const ringMeshes = [];
        const ringCount = 4; 
        const particlePerRing = 15000; 

        for (let i = 0; i < ringCount; i++) {
            const ringGeo = new THREE.BufferGeometry();
            const ringPositions = new Float32Array(particlePerRing * 3);
            const ringColors = new Float32Array(particlePerRing * 3);
            const ringSizes = new Float32Array(particlePerRing);

            const radius = 7.0 + i * 2.2;
            const thickness = 0.5 + i * 0.4;

            for (let j = 0; j < particlePerRing; j++) {
                const angle = (j / particlePerRing) * Math.PI * 2;
                const radiusVariation = radius + (Math.random() - 0.5) * thickness;
                
                ringPositions[j*3] = Math.cos(angle) * radiusVariation;
                ringPositions[j*3+1] = (Math.random() - 0.5) * thickness;
                ringPositions[j*3+2] = Math.sin(angle) * radiusVariation;

                const hue = (i / ringCount) * 0.8 + (j / particlePerRing) * 0.2;
                const color = new THREE.Color().setHSL(hue, 1, 0.6);
                ringColors[j*3] = color.r;
                ringColors[j*3+1] = color.g;
                ringColors[j*3+2] = color.b;

                ringSizes[j] = Math.random() * 2.5 + 0.5;
            }

            ringGeo.setAttribute('position', new THREE.BufferAttribute(ringPositions, 3));
            ringGeo.setAttribute('customColor', new THREE.BufferAttribute(ringColors, 3));
            ringGeo.setAttribute('size', new THREE.BufferAttribute(ringSizes, 1));
            
            const ringMesh = new THREE.Points(ringGeo, shaderMaterial);
            
            ringMesh.rotation.x = Math.random() * Math.PI;
            ringMesh.rotation.y = Math.random() * Math.PI;
            
            ringMesh.userData = {
                speedX: (Math.random() - 0.5) * 0.3,
                speedY: (Math.random() - 0.5) * 0.3,
                speedZ: (Math.random() - 0.5) * 0.3
            };

            ringMeshes.push(ringMesh);
            masterGroup.add(ringMesh);
        }

        // --- Mouse Parallax Interaction ---
        let mouseX = 0;
        let mouseY = 0;
        let targetX = 0;
        let targetY = 0;
        const windowHalfX = window.innerWidth / 2;
        const windowHalfY = window.innerHeight / 2;

        document.addEventListener('mousemove', (event) => {
            mouseX = (event.clientX - windowHalfX);
            mouseY = (event.clientY - windowHalfY);
        });

        // Also handle touch events for mobile displays
        document.addEventListener('touchmove', (event) => {
            if (event.touches.length > 0) {
                mouseX = (event.touches[0].clientX - windowHalfX);
                mouseY = (event.touches[0].clientY - windowHalfY);
            }
        });

        // --- Animation Loop ---
        const clock = new THREE.Clock();

        function animate() {
            requestAnimationFrame(animate);
            const elapsedTime = clock.getElapsedTime();
            
            coreMesh.rotation.y = elapsedTime * 0.1;
            const scale = 1 + Math.sin(elapsedTime * 1.5) * 0.03;
            coreMesh.scale.set(scale, scale, scale);

            ringMeshes.forEach(ring => {
                ring.rotation.x += ring.userData.speedX * 0.01;
                ring.rotation.y += ring.userData.speedY * 0.01;
                ring.rotation.z += ring.userData.speedZ * 0.01;
            });

            targetX = mouseX * 0.001;
            targetY = mouseY * 0.001;
            masterGroup.rotation.y += 0.05 * (targetX - masterGroup.rotation.y);
            masterGroup.rotation.x += 0.05 * (targetY - masterGroup.rotation.x);
            
            controls.update();
            composer.render();
        }

        // --- Resize Handler ---
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
            composer.setSize(window.innerWidth, window.innerHeight);
        });

        animate();
    </script>
</body>
</html>
